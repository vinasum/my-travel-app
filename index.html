<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.4 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --n-gold: #E6B422; --n-wago: #1A2A3A; --n-sakura: rgba(255, 192, 203, 0.12); }
        body { font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-wago); background-image: radial-gradient(var(--n-sakura) 1.5px, transparent 1.5px); background-size: 24px 24px; color: #FFFFFF; text-align: left; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.2); overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); color: #1F2937; }
        .glass-card-dark { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        nav { background: rgba(255, 255, 255, 0.18); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 1px solid rgba(255, 255, 255, 0.15); z-index: 100; }
        
        .is-past { filter: grayscale(100%) opacity(0.4); transform: scale(0.97); }
        .muji-btn { background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); color: white; padding: 16px; border-radius: 18px; font-weight: 900; text-align: center; border: none; width: 100%; display: block; cursor: pointer; }
        
        /* 標籤樣式：確保設定頁面有提示詞 */
        label { display: block; font-size: 12px !important; font-weight: 900; color: #8D6E63; margin-bottom: 4px; margin-top: 8px; }
        input, select, textarea { width: 100%; border: 1px solid #CCC !important; border-radius: 14px; padding: 12px; margin-bottom: 8px; outline: none; background: #FFFFFF !important; color: #111 !important; font-size: 14px !important; }
        
        .page { display: none; padding-bottom: 160px; }
        .page.active { display: block; }
        .nav-active { color: var(--n-gold) !important; }
        .drive-container { margin-left: 32px; margin-top: -8px; margin-bottom: 16px; border-left: 2px dashed rgba(255,255,255,0.2); padding: 8px 0 8px 20px; }
        .drive-tag { background: rgba(255,255,255,0.1); color: #FFF; font-weight: 900; padding: 4px 12px; border-radius: 99px; font-size: 11px !important; }
        
        /* 彈窗 z-index 必須最高 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
    </style>
</head>
<body class="max-w-md mx-auto relative px-5">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 1000; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    
    <header class="pt-10 pb-6 flex justify-between items-center text-left">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-white">名古屋旅程</h1>
            <i class="fa-solid fa-fish-fins text-amber-400 text-2xl rotate-45"></i>
        </div>
        <button onclick="pullData()" class="text-white/30 text-2xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main>
        <div id="page-itinerary" class="page active">
            <div onclick="openPassengerList()" class="glass-card p-5 border-t-8 border-amber-400 active:scale-95 transition-transform cursor-pointer">
                <div class="flex justify-between items-center mb-3"><h2 class="font-black text-xl text-gray-800" id="f-airline">載入中...</h2><i class="fa-solid fa-chevron-right text-gray-300"></i></div>
                <div id="flightSummary" class="space-y-3 text-gray-600 font-bold">
                    <div><p class="text-gray-800">去程：<span id="f-dep-date">--/--</span> <span id="f-dep-from">---</span> ✈️ <span id="f-dep-to">---</span></p><p class="text-xs opacity-60"><span id="f-dep-no">---</span> <span id="f-dep-time">--:--</span> → <span id="f-dep-arr-time">--:--</span></p></div>
                    <div><p class="text-gray-800">回程：<span id="f-arr-date">--/--</span> <span id="f-arr-from">---</span> ✈️ <span id="f-arr-to">---</span></p><p class="text-xs opacity-60"><span id="f-arr-no">---</span> <span id="f-arr-time">--:--</span> → <span id="f-arr-arr-time">--:--</span></p></div>
                </div>
            </div>
            <button onclick="openAddItinerary()" class="muji-btn my-4 shadow-xl">＋ 新增行程項目</button>
            <div id="itineraryList" class="space-y-0"></div>
        </div>

        <div id="page-tools" class="page">
            <h2 class="font-black mb-4 text-xl text-amber-400">設定與管理</h2>
            <div class="glass-card-dark">
                <label>當前匯率 (JPY to TWD)</label>
                <input id="exRate" type="number" step="0.001" onchange="saveSettingsOnly()">
            </div>
            <div class="glass-card-dark">
                <label>名單管理</label>
                <div class="flex gap-2 mb-4"><input id="newPayer" type="text" placeholder="輸入姓名"><button onclick="addPayerName()" class="muji-btn w-auto px-4">+</button></div>
                <div id="payerManagerList" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="glass-card-dark">
                <label>數據維護</label>
                <button onclick="openFlightEdit()" class="w-full py-4 bg-white/10 rounded-xl font-bold border border-white/10 text-white mb-4">修改航班與日期資訊</button>
                <button onclick="resetToDefault()" class="w-full py-2 text-red-400/50 text-xs font-bold border border-red-400/10 rounded-xl">🆘 清除手機暫存 (SOS)</button>
            </div>
            <p class="text-center opacity-20 text-[10px] mt-4">v9.4 Stable | Nagoya 2026</p>
        </div>

        <div id="page-items" class="page"><h2 class="font-black mb-4 text-xl">清單</h2><div id="bringList" class="space-y-2"></div><div id="buyList" class="mt-4"></div></div>
        <div id="page-budget" class="page"><div class="glass-card-dark text-center"><div class="text-4xl font-black text-amber-400">¥ <span id="totalSpend">0</span></div></div><div id="expList" class="mt-4"></div></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-around py-3 pb-8">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="text-white/40 flex flex-col items-center nav-active"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[10px] font-bold mt-1">行程</span></button>
        <button onclick="switchPage('items')" id="nav-items" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-list-check text-xl"></i><span class="text-[10px] font-bold mt-1">清單</span></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-coins text-xl"></i><span class="text-[10px] font-bold mt-1">記帳</span></button>
        <button onclick="switchPage('tools')" id="nav-tools" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[10px] font-bold mt-1">設定</span></button>
    </nav>

    <div id="viewModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-8 relative"><button onclick="closeModal('viewModal')" class="absolute top-4 right-4 text-2xl text-gray-400">×</button><div id="viewContent"></div><div class="mt-6 flex flex-col gap-2"><button id="viewMapBtn" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black">開啟導航</button><div class="grid grid-cols-2 gap-2"><button id="viewEditBtn" class="py-4 bg-gray-100 rounded-xl font-bold">編輯</button><button id="viewDelBtn" class="py-4 bg-red-50 text-red-400 rounded-xl font-bold">刪除</button></div></div></div></div>

    <div id="itineraryModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 h-[80vh] overflow-y-auto"><h3>編輯行程</h3><input type="hidden" id="itIdx"><label>日期</label><input id="itDate" type="date"><label>時間</label><input id="itTime" type="time"><label>下一站車程 (例如: 45min)</label><input id="itDrive" type="text"><label>行程名稱</label><input id="itHeading" type="text"><label>地點 (用於導航)</label><input id="itLoc" type="text"><label>備註</label><textarea id="itNote" style="height:100px"></textarea><button onclick="saveItinerary()" class="muji-btn mt-4">儲存</button><button onclick="closeModal('itineraryModal')" class="w-full py-4 text-gray-400">取消</button></div></div>

    <div id="flightEditModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 h-[80vh] overflow-y-auto">
        <h3 class="font-black text-lg mb-4">航班資訊設定</h3>
        <label>航空公司</label><input id="in-airline">
        <div class="border-t pt-4 mt-4">
            <p class="font-black text-blue-600 mb-2">去程資訊 (Departure)</p>
            <label>去程日期</label><input id="in-dep-date" type="date">
            <div class="grid grid-cols-2 gap-2"><label>起點</label><input id="in-dep-from"><label>終點</label><input id="in-dep-to"></div>
            <div class="grid grid-cols-3 gap-1"><label>編號</label><input id="in-dep-no"><label>起飛</label><input id="in-dep-time" type="time"><label>抵達</label><input id="in-dep-arr-time" type="time"></div>
        </div>
        <div class="border-t pt-4 mt-4">
            <p class="font-black text-red-600 mb-2">回程資訊 (Return)</p>
            <label>回程日期</label><input id="in-arr-date" type="date">
            <div class="grid grid-cols-2 gap-2"><label>起點</label><input id="in-arr-from"><label>終點</label><input id="in-arr-to"></div>
            <div class="grid grid-cols-3 gap-1"><label>編號</label><input id="in-arr-no"><label>起飛</label><input id="in-arr-time" type="time"><label>抵達</label><input id="in-arr-arr-time" type="time"></div>
        </div>
        <button onclick="saveFlightMain()" class="muji-btn mt-6">儲存設定</button>
        <button onclick="closeModal('flightEditModal')" class="w-full py-4 text-gray-400">取消</button>
    </div></div>

    <div id="psgrListModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 relative"><button onclick="closeModal('psgrListModal')" class="absolute top-4 right-4 text-xl">×</button><h3 class="font-black text-xl mb-4 text-gray-800">旅客資訊</h3><div id="psgrContainer" class="space-y-3"></div></div></div>
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full opacity-0 transition-all z-[9999] pointer-events-none"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyygnjaryM3s4Zf9XSnVStWNhBpwUoFrdJp1jX2-IFmYzglxlfdd_enycNmW5Y_92ejfg/exec';
        const DB_KEY = 'vina_travel_v9_4';
        const masterData = {
            flightMain: { airline: "星宇航空", depFrom: "TPE", depTo: "NGO", depDate: "2026-05-23", depNo: "JX830", depTime: "10:00", depArrTime: "14:00", arrFrom: "NGO", arrTo: "TPE", arrDate: "2026-05-29", arrNo: "JX831", arrTime: "16:35", arrArrTime: "20:30" },
            passengers: Array(5).fill().map((_, i) => ({ name: "旅客 " + (i+1), pnr: "VINA88", seat: "--", meal: "--" })),
            itinerary: [{ date: "2026-05-23", time: "15:30", driveTime: "45min", title: "抵達機場 & 取車", location: "NGO Airport", note: "" }],
            checkBring: [], checkBuy: [], expenses: [], payers: ["薇那", "大人B", "大人C"], rate: 0.21
        };
        let db = JSON.parse(JSON.stringify(masterData));

        function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active')); document.getElementById('nav-' + p).classList.add('nav-active'); }
        function openModal(id) { const el = document.getElementById(id); if(el) el.classList.remove('hidden'); }
        function closeModal(id) { const el = document.getElementById(id); if(el) el.classList.add('hidden'); }

        function init() { 
            try { 
                const local = localStorage.getItem(DB_KEY); 
                if (local) { db = { ...masterData, ...JSON.parse(local) }; }
                document.getElementById('exRate').value = db.rate || 0.21;
                renderAll(); 
            } catch(e) { console.error("Init Error:", e); renderAll(); } 
        }

        function renderAll() {
            try {
                const today = "2026-04-08";
                const f = db.flightMain || masterData.flightMain;
                document.getElementById('f-airline').innerText = f.airline;
                document.getElementById('f-dep-date').innerText = (f.depDate||"").replace('2026-', '');
                document.getElementById('f-arr-date').innerText = (f.arrDate||"").replace('2026-', '');
                document.getElementById('f-dep-from').innerText = f.depFrom; document.getElementById('f-dep-to').innerText = f.depTo;
                document.getElementById('f-dep-no').innerText = f.depNo; document.getElementById('f-dep-time').innerText = f.depTime; document.getElementById('f-dep-arr-time').innerText = f.depArrTime;
                document.getElementById('f-arr-from').innerText = f.arrFrom; document.getElementById('f-arr-to').innerText = f.arrTo;
                document.getElementById('f-arr-no').innerText = f.arrNo; document.getElementById('f-arr-time').innerText = f.arrTime; document.getElementById('f-arr-arr-time').innerText = f.arrArrTime;

                const itList = document.getElementById('itineraryList'); itList.innerHTML = '';
                db.itinerary.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time)).forEach((it, idx) => {
                    const isPast = it.date < today ? "is-past" : "";
                    const card = document.createElement('div');
                    card.className = `glass-card p-6 border-l-[8px] border-amber-400 ${isPast} cursor-pointer active:scale-95 transition-transform`;
                    card.onclick = () => viewDetail(idx);
                    card.innerHTML = `<span class="font-black text-gray-400 text-xs">${it.date.replace('2026-', '')} ${it.time}</span>
                                      <h3 class="font-black text-gray-800 mt-1 text-lg">${it.title || '(未命名)'}</h3>
                                      <p class="text-blue-600 font-bold mt-1 text-sm">${it.location || ''}</p>`;
                    itList.appendChild(card);
                    if (it.driveTime && idx < db.itinerary.length - 1) {
                        const drive = document.createElement('div');
                        drive.className = `drive-container ${isPast}`;
                        drive.innerHTML = `<div class="drive-tag">🚗 ${it.driveTime}</div>`;
                        itList.appendChild(drive);
                    }
                });
                document.getElementById('payerManagerList').innerHTML = (db.payers||[]).map((p, i) => `<div class="bg-white/10 px-4 py-1 rounded-full text-sm">${p} <button onclick="delPayerName(${i})">×</button></div>`).join('');
            } catch(e) { console.error("Render Error:", e); }
        }

        function viewDetail(idx) {
            try {
                const it = db.itinerary[idx];
                const content = document.getElementById('viewContent');
                content.innerHTML = `<p class="opacity-40 font-black uppercase text-xs">${it.date.replace('2026-', '')} ${it.time}</p>
                                     <h2 class="text-2xl font-black mb-2 text-gray-800">${it.title || '未命名'}</h2>
                                     <p class="text-blue-600 font-bold mb-4">${it.location || ''}</p>
                                     <div class="bg-gray-50 p-6 rounded-2xl text-gray-600 leading-relaxed">${(it.note || '無備註').replace(/\n/g, '<br>')}</div>`;
                document.getElementById('viewMapBtn').onclick = () => window.open("http://maps.google.com/?q=" + encodeURIComponent(it.location));
                document.getElementById('viewEditBtn').onclick = () => { closeModal('viewModal'); openEditItinerary(idx); };
                document.getElementById('viewDelBtn').onclick = () => { if(confirm("確定刪除行程？")) { db.itinerary.splice(idx,1); pushData(); closeModal('viewModal'); }};
                openModal('viewModal');
            } catch(e) { alert("無法開啟行程細節"); }
        }

        function openPassengerList() {
            document.getElementById('psgrContainer').innerHTML = (db.passengers||[]).map(p => `<div class="p-4 glass-card bg-stone-100/50"><p class="font-black text-lg text-gray-800">${p.name}</p><p class="text-amber-600 font-bold">${p.pnr}</p><div class="flex gap-4 opacity-50 text-xs mt-2 text-gray-500"><span>座: ${p.seat}</span><span>餐: ${p.meal}</span></div></div>`).join('');
            openModal('psgrListModal');
        }

        function openFlightEdit() {
            const f = db.flightMain;
            document.getElementById('in-airline').value = f.airline;
            document.getElementById('in-dep-date').value = f.depDate;
            document.getElementById('in-dep-from').value = f.depFrom;
            document.getElementById('in-dep-to').value = f.depTo;
            document.getElementById('in-dep-no').value = f.depNo;
            document.getElementById('in-dep-time').value = f.depTime;
            document.getElementById('in-dep-arr-time').value = f.depArrTime;
            document.getElementById('in-arr-date').value = f.arrDate;
            document.getElementById('in-arr-from').value = f.arrFrom;
            document.getElementById('in-arr-to').value = f.arrTo;
            document.getElementById('in-arr-no').value = f.arrNo;
            document.getElementById('in-arr-time').value = f.arrTime;
            document.getElementById('in-arr-arr-time').value = f.arrArrTime;
            openModal('flightEditModal');
        }

        async function saveFlightMain() {
            db.flightMain = {
                airline: document.getElementById('in-airline').value,
                depDate: document.getElementById('in-dep-date').value,
                depFrom: document.getElementById('in-dep-from').value,
                depTo: document.getElementById('in-dep-to').value,
                depNo: document.getElementById('in-dep-no').value,
                depTime: document.getElementById('in-dep-time').value,
                depArrTime: document.getElementById('in-dep-arr-time').value,
                arrDate: document.getElementById('in-arr-date').value,
                arrFrom: document.getElementById('in-arr-from').value,
                arrTo: document.getElementById('in-arr-to').value,
                arrNo: document.getElementById('in-arr-no').value,
                arrTime: document.getElementById('in-arr-time').value,
                arrArrTime: document.getElementById('in-arr-arr-time').value
            };
            closeModal('flightEditModal'); await pushData();
        }

        function saveLocal() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
        async function pushData() { document.getElementById('syncBar').style.transform = 'scaleX(1)'; saveLocal(); renderAll(); try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(db) }); } catch(e){} document.getElementById('syncBar').style.transform = 'scaleX(0)'; }
        async function pullData() { document.getElementById('syncBar').style.transform = 'scaleX(1)'; try { const res = await fetch(GOOGLE_SCRIPT_URL); const data = await res.json(); if(data && data.itinerary) { db = data; saveLocal(); renderAll(); } } catch (e) {} document.getElementById('syncBar').style.transform = 'scaleX(0)'; }
        async function resetToDefault() { if(confirm("確定重置數據？")) { localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</html>
