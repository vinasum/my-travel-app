<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v10.0 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --n-gold: #E6B422; --n-wago: #1A2A3A; --n-sakura: rgba(255, 192, 203, 0.15); }
        
        body { 
            font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-wago); 
            background-image: radial-gradient(var(--n-sakura) 1.5px, transparent 1.5px); 
            background-size: 24px 24px; color: #FFFFFF; text-align: left; margin: 0; min-height: 100vh;
        }

        /* 磨砂玻璃卡片 */
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.2); 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); color: #1F2937;
        }

        /* 導航列：偏透明白磨砂 (符合妳的視覺建議) */
        nav { 
            background: rgba(255, 255, 255, 0.22); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-top: 1px solid rgba(255, 255, 255, 0.3); z-index: 500; 
        }
        nav button { color: rgba(31, 41, 55, 0.6) !important; } /* 深色圖示於白底 */
        .nav-active { color: var(--n-gold) !important; font-weight: 900 !important; }

        /* 輸入框強制：白底黑字 (確保記帳看不見文字的問題消失) */
        label { display: block; font-size: 12px; font-weight: 900; color: var(--n-gold); margin-bottom: 4px; margin-top: 8px; }
        input, select, textarea { 
            width: 100%; border: 1px solid #CCC !important; border-radius: 14px; padding: 12px; margin-bottom: 8px; 
            outline: none; background: #FFFFFF !important; color: #111111 !important; font-size: 14px !important;
        }
        input::placeholder { color: #888 !important; }

        .page { display: none; padding: 20px; padding-bottom: 160px; }
        .page.active { display: block; }
        
        /* 氣象滑動 (原始 6H 穩定版) */
        .weather-scroll { display: flex; overflow-x: auto; gap: 15px; scrollbar-width: none; }
        .weather-scroll::-webkit-scrollbar { display: none; }
        .weather-item { flex: 0 0 65px; text-align: center; color: white; }

        .muji-btn { 
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); 
            color: white; padding: 16px; border-radius: 18px; font-weight: 900; text-align: center; border: none; width: 100%; cursor: pointer;
        }

        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
        
        .is-past { filter: grayscale(100%) opacity(0.4); transform: scale(0.97); }
    </style>
</head>
<body class="max-w-md mx-auto relative">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 1100; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    
    <header class="pt-10 pb-4 px-5 flex justify-between items-center text-left">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-white">名古屋旅程</h1>
            <i class="fa-solid fa-fish-fins text-amber-400 text-2xl rotate-45"></i>
        </div>
        <button onclick="pullData()" class="text-white/30 text-2xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main>
        <div id="page-itinerary" class="page active">
            <div onclick="openPassengerList()" class="glass-card p-5 border-t-8 border-amber-400 cursor-pointer">
                <div class="flex justify-between items-center mb-3"><h2 class="font-black text-xl text-gray-800" id="f-airline">載入中...</h2><i class="fa-solid fa-chevron-right text-gray-300"></i></div>
                <div class="space-y-3 text-gray-600 font-bold">
                    <div><p class="text-gray-800">去程：<span id="f-dep-date">--/--</span> <span id="f-dep-from">---</span> ✈️ <span id="f-dep-to">---</span></p></div>
                    <div><p class="text-gray-800">回程：<span id="f-arr-date">--/--</span> <span id="f-arr-from">---</span> ✈️ <span id="f-arr-to">---</span></p></div>
                </div>
            </div>
            
            <div class="bg-white/10 rounded-[20px] p-5 mt-4">
                <div class="flex justify-between items-center mb-3"><span class="text-xs opacity-50 font-black">WEATHER (6H)</span><button onclick="updateWeather()" class="text-amber-400 text-xs font-black">更新</button></div>
                <div id="weatherContainer" class="weather-scroll py-2"><p class="w-full text-center opacity-40">更新載入中...</p></div>
            </div>

            <button onclick="openAddItinerary()" class="muji-btn my-4 shadow-xl">＋ 新增行程項目</button>
            <div id="itineraryList" class="space-y-0"></div>
        </div>

        <div id="page-items" class="page">
            <h2 class="font-black mb-4 text-xl">清單項目</h2>
            <div class="bg-white/5 border-t-4 border-blue-400 p-5 rounded-2xl mb-4">
                <h3 class="font-black text-blue-300 mb-3">要攜帶 (To Bring)</h3>
                <div class="flex gap-2 mb-4">
                    <input id="bringInput" type="text" placeholder="輸入物品名稱">
                    <button onclick="addItem('bring')" class="muji-btn w-auto px-6 bg-blue-600">＋</button>
                </div>
                <div id="bringList"></div>
            </div>
            <div class="bg-white/5 border-t-4 border-red-400 p-5 rounded-2xl">
                <h3 class="font-black text-red-300 mb-3">要購買 (To Buy)</h3>
                <div class="flex gap-2 mb-4">
                    <input id="buyInput" type="text" placeholder="輸入商品名稱">
                    <button onclick="addItem('buy')" class="muji-btn w-auto px-6 bg-red-600">＋</button>
                </div>
                <div id="buy
