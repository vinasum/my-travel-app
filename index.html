<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋旅程 v7.2 穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --n-gold: #E6B422; --n-miso: #8D6E63; --n-paper: #FDFBF7; }
        body { font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-paper); color: #1F2937; text-align: left; }
        p, span, div, input, button, label, select, textarea { font-size: 14px !important; }
        .card { background: #FFFFFF; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 12px; overflow: hidden; border: 1px solid rgba(230,180,34,0.15); }
        .muji-btn { background: linear-gradient(135deg, var(--n-miso) 0%, #6D4C41 100%); color: white; padding: 16px; border-radius: 18px; font-weight: 700; text-align: center; cursor: pointer; display: block; border: none; width: 100%; }
        .page { display: none; padding-bottom: 150px; }
        .page.active { display: block; }
        .nav-active { color: var(--n-miso) !important; font-weight: 900 !important; }
        /* 清單絕對不換行修復 */
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.03); flex-wrap: nowrap !important; }
        .list-text { font-weight: 700; color: #4B5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; margin-right: 10px; }
        .list-del { flex-shrink: 0 !important; color: #D1D5DB; font-size: 24px !important; padding: 0 10px; }
        .weather-scroll { display: flex; overflow-x: auto; gap: 10px; }
        .weather-item { flex: 0 0 calc(33.33% - 7px); text-align: center; background: rgba(255,255,255,0.8); padding: 12px 5px; border-radius: 18px; border: 1px solid rgba(230,180,34,0.1); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative text-left">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 9999; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    <header class="p-6 pt-10 flex justify-between items-center">
        <h1 class="text-2xl font-black text-gray-800">名古屋旅程 <span class="bg-amber-400 text-[12px] px-2 py-1 rounded-lg ml-1">v7.2</span></h1>
        <button onclick="pullData()" class="text-stone-300 text-3xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="px-5">
        <div id="page-itinerary" class="page active">
            <div onclick="openFlightModal()" class="card p-5 border-t-8 border-amber-400">
                <div class="flex justify-between items-center mb-3"><h2 class="font-black text-lg" id="f-airline">航空公司</h2><i class="fa-solid fa-chevron-right text-stone-200"></i></div>
                <div class="space-y-2">
                    <div><p class="text-blue-500 font-black uppercase text-[12px]">去程</p><p id="f-dep-line" class="font-bold text-gray-600">載入中...</p></div>
                    <div><p class="text-red-500 font-black uppercase text-[12px]">回程</p><p id="f-arr-line" class="font-bold text-gray-600">載入中...</p></div>
                </div>
            </div>
            <div class="card p-4 bg-blue-50/50 border-none">
                <div class="flex justify-between items-center mb-2"><span class="font-black text-gray-500 uppercase">Weather (6H)</span><button onclick="updateWeather()" class="text-amber-600 font-bold">更新</button></div>
                <div id="weatherContainer" class="weather-scroll"><p class="w-full text-center opacity-40">點擊更新...</p></div>
            </div>
            <button onclick="openAddItinerary()" class="muji-btn mb-4">＋ 新增行程</button>
            <div id="itineraryList" class="space-y-0"></div>
            <button onclick="resetToDefault()" class="w-full py-4 mt-20 text-stone-300 font-bold border border-stone-100 rounded-2xl">🆘 恢復行程備份</button>
        </div>

        <div id="page-items" class="page">
            <h2 class="font-black mb-4 text-xl">清單</h2>
            <div class="card p-5 border-t-4 border-blue-400"><h3 class="font-black text-blue-500 mb-3">攜帶物品</h3>
                <div class="flex gap-2 mb-2"><input id="bringInput" type="text" placeholder="帶什麼？"><button onclick="addItem('bring')" class="muji-btn w-auto px-5 bg-blue-500 shadow-none">＋</button></div>
                <div id="bringList"></div>
            </div>
            <div class="card p-5 border-t-4 border-red-400 mt-4"><h3 class="font-black text-red-500 mb-3">要買清單</h3>
                <div class="flex gap-2 mb-2"><input id="buyInput" type="text" placeholder="買什麼？"><button onclick="addItem('buy')" class="muji-btn w-auto px-5 bg-red-500 shadow-none">＋</button></div>
                <div id="buyList"></div>
            </div>
        </div>

        <div id="page-budget" class="page">
            <div class="card p-8 bg-stone-800 text-white text-center mb-4"><div class="text-3xl font-black">¥ <span id="totalSpend">0</span></div><p class="opacity-50 mt-1">≈ NT$ <span id="totalTWD">0</span></p></div>
            <div id="payerStats" class="grid grid-cols-3 gap-2 mb-4"></div>
            <div class="card p-5"><input id="expName" type="text" placeholder="項目"><input id="expCost" type="number" placeholder="金額(JPY)"><select id="expPayer"></select><button onclick="addExp()" class="muji-btn mt-2">儲存支出</button></div>
            <div id="expList" class="space-y-2 mt-4"></div>
        </div>

        <div id="page-tools" class="page"><h2 class="font-black mb-6 text-xl">設定</h2><div class="card p-6"><h3 class="font-bold text-gray-400 mb-4 uppercase">名單管理</h3><div class="flex gap-2 mb-4"><input id="newPayer" type="text" placeholder="姓名"><button onclick="addPayerName()" class="muji-btn w-auto px-4">+</button></div><div id="payerManagerList" class="flex flex-wrap gap-2 mb-6"></div><hr class="my-4"><label class="font-black text-gray-500">匯率 (1 JPY = ? TWD)</label><input id="exRate" type="number" step="0.001" value="0.21" onchange="saveSettingsOnly()" class="text-amber-600 font-bold"></div></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-amber-50 flex justify-around py-4 pb-10 z-50">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="flex flex-col items-center text-stone-300"><i class="fa-solid fa-map-location-dot text-2xl"></i><span class="mt-1">行程</span></button>
        <button onclick="switchPage('items')" id="nav-items" class="flex flex-col items-center text-stone-300"><i class="fa-solid fa-list-check text-2xl"></i><span class="mt-1">清單</span></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="flex flex-col items-center text-stone-300"><i class="fa-solid fa-coins text-2xl"></i><span class="mt-1">記帳</span></button>
        <button onclick="switchPage('tools')" id="nav-tools" class="flex flex-col items-center text-stone-300"><i class="fa-solid fa-user-gear text-2xl"></i><span class="mt-1">設定</span></button>
    </nav>

    <div id="flightModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300] backdrop-blur-md text-left"><div class="card w-full p-6 h-[85vh] overflow-y-auto border-t-8 border-amber-400"><div class="flex justify-between items-center mb-6"><h3 class="font-black text-xl">航班旅客詳情</h3><button onclick="closeModal('flightModal')" class="text-4xl">×</button></div><div class="bg-stone-50 p-4 rounded-2xl mb-4"><div class="flex justify-between mb-2"><span class="font-black text-amber-600">SCHEDULE</span><button onclick="editMainFlightSchedule()" class="text-blue-500 font-bold">修改</button></div><p id="m-sum-airline" class="font-black"></p><p id="m-sum-dep" class="text-gray-500"></p><p id="m-sum-arr" class="text-gray-500"></p></div><div id="psgrCardList" class="space-y-3"></div></div></div>
    <div id="psgrEditModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-[400] text-left"><div class="card w-full p-6 h-[80vh] overflow-y-auto border-t-8 border-blue-500"><h3 class="font-black mb-4">編輯機票</h3><label>姓名</label><input id="psgr-name" type="text"><div class="p-4 bg-blue-50 rounded-2xl mb-4">去程 PNR<input id="psgr-dep-pnr" type="text">座位<input id="psgr-dep-seat" type="text">餐點<input id="psgr-dep-meal" type="text"></div><div class="p-4 bg-red-50 rounded-2xl mb-4">回程 PNR<input id="psgr-arr-pnr" type="text">座位<input id="psgr-arr-seat" type="text">餐點<input id="psgr-arr-meal" type="text"></div><button onclick="savePassengerDetails()" class="muji-btn">確定</button></div></div>
    <div id="viewModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[200] text-left"><div class="card w-full p-8 relative flex flex-col min-h-[60vh]"><button onclick="closeModal('viewModal')" class="absolute top-6 right-6 text-4xl">×</button><div id="viewContent" class="flex-grow"></div><div class="mt-8 space-y-4"><button id="viewMapBtn" class="w-full py-6 bg-blue-600 text-white rounded-3xl font-black text-xl">導航</button><div class="grid grid-cols-2 gap-4"><button id="viewEditBtn" class="py-5 bg-stone-100 rounded-2xl font-bold">編輯</button><button id="viewAiBtn" class="py-5 bg-stone-100 rounded-2xl font-bold">問 AI</button></div><button id="viewDelBtn" class="text-red-400 font-bold w-full text-center py-4 opacity-50">刪除行程</button></div></div></div>
    <div id="itineraryModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300] text-left"><div class="card w-full p-6 h-[85vh] overflow-y-auto"><h3 class="font-black mb-4 text-xl">編輯行程</h3><input type="hidden" id="itIdx"><div class="grid grid-cols-2 gap-4"><div>日期<input id="itDate" type="text"></div><div>時間(24H)<input id="itTime" type="time"></div></div>標題<input id="itHeading" type="text">地址<input id="itLoc" type="text">銜接時間<input id="itDrive" type="text">備註<textarea id="itNote" class="h-40"></textarea><button onclick="saveItinerary()" class="muji-btn">確認</button></div></div>
    <div id="mainFlightEditModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-[400] text-left"><div class="card w-full p-6 h-[85vh] overflow-y-auto"><h3 class="font-black mb-4">修改主航班</h3>航空<input id="edit-airline" type="text">去程日期<input id="edit-dep-date" type="text">去程航班<input id="edit-dep-no" type="text">去程起迄機場<div class="grid grid-cols-2 gap-2"><input id="edit-dep-from" type="text"><input id="edit-dep-to" type="text"></div>起飛/抵達時間<div class="grid grid-cols-2 gap-2"><input id="edit-dep-time" type="time"><input id="edit-dep-arr" type="time"></div><hr class="my-4">回程日期<input id="edit-arr-date" type="text">回程航班<input id="edit-arr-no" type="text">回程起迄機場<div class="grid grid-cols-2 gap-2"><input id="edit-arr-from" type="text"><input id="edit-arr-to" type="text"></div>起飛/抵達時間<div class="grid grid-cols-2 gap-2"><input id="edit-arr-time" type="time"><input id="edit-arr-arr" type="time"></div><button onclick="saveMainFlightSchedule()" class="muji-btn mt-4">儲存</button></div></div>
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full opacity-0 transition-opacity z-[9999] pointer-events-none shadow-2xl border border-amber-400"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyygnjaryM3s4Zf9XSnVStWNhBpwUoFrdJp1jX2-IFmYzglxlfdd_enycNmW5Y_92ejfg/exec';
        const DB_KEY = 'vina_travel_v7_2_local';
        const masterData = {
            flightMain: { airline: "星宇航空", depDate: "05/23", depNo: "JX830", depTime: "10:00", depArrTime: "14:00", depFrom: "TPE", depTo: "NGO", arrDate: "05/29", arrNo: "JX831", arrTime: "16:35", arrArrTime: "20:30", arrFrom: "NGO", arrTo: "TPE" },
            passengers: Array(5).fill().map((_, i) => ({ name: "旅客 " + (i+1), dep: {pnr:"ABCDEF", seat:"--", meal:"一般餐"}, ret: {pnr:"ABCDEF", seat:"--", meal:"一般餐"} })),
            itinerary: [{ date: "05/23", time: "15:30", title: "抵達機場 & 取車", location: "中部國際機場(NGO)", driveInfo: "開車 45min", note: "取車。檢查：日文譯本、駕照。" }],
            checkBring: [{text:"護照", done:false},{text:"譯本", done:false}], checkBuy: [], expenses: [], payers: ["薇那", "大人B", "大人C"], rate: 0.21
        };
        let db = JSON.parse(JSON.stringify(masterData));
        let activePsgrIdx = -1;

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active'));
            document.getElementById('nav-' + p).classList.add('nav-active');
            window.scrollTo(0,0);
        }
        function init() {
            const local = localStorage.getItem(DB_KEY);
            if (local) { db = JSON.parse(local); }
            renderAll();
        }
        async function pullData() {
            showSync(true);
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const data = await res.json();
                if(data && data.itinerary) { db = data; saveLocal(); toast("🏮 雲端同步完成"); }
            } catch (e) { toast("同步失敗"); }
            renderAll(); showSync(false);
        }
        async function pushData() { showSync(true); saveLocal(); renderAll(); try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(db) }); } catch(e){} showSync(false); }
        function saveLocal() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
        function renderAll() {
            const f = db.flightMain;
            document.getElementById('f-airline').innerText = f.airline;
            document.getElementById('f-dep-line').innerText = f.depDate + ' ' + f.depNo + ' ' + f.depTime + '-' + f.depArrTime + ' (' + f.depFrom + '→' + f.depTo + ')';
            document.getElementById('f-arr-line').innerText = f.arrDate + ' ' + f.arrNo + ' ' + f.arrTime + '-' + f.arrArrTime + ' (' + f.arrFrom + '→' + f.arrTo + ')';
            const itList = document.getElementById('itineraryList'); itList.innerHTML = '';
            db.itinerary.forEach((it, idx) => {
                itList.innerHTML += '<div onclick="viewDetail(' + idx + ')" class="card p-6 border-l-[8px] border-amber-400 active:scale-98 transition-all text-left"><span class="font-black text-stone-400 uppercase">' + it.date + ' ' + it.time + '</span><h3 class="font-black text-gray-800 mt-1">' + it.title + '</h3><p class="text-blue-500 font-bold mt-1"><i class="fa-solid fa-location-dot"></i> ' + it.location + '</p></div>';
                if(it.driveInfo && idx < db.itinerary.length - 1) itList.innerHTML += '<div class="drive-line"><span class="bg-white text-blue-600 font-black px-4 py-1.5 rounded-full border border-blue-50 shadow-sm">' + it.driveInfo + '</span></div>';
            });
            const rate = db.rate || 0.21; document.getElementById('exRate').value = rate; let total = 0; const payerTotals = {}; db.payers.forEach(p => payerTotals[p] = 0);
            document.getElementById('expList').innerHTML = db.expenses.slice().reverse().map((e, idx) => {
                total += e.cost; if(payerTotals.hasOwnProperty(e.payer)) payerTotals[e.payer] += e.cost; const rIdx = db.expenses.length - 1 - idx;
                return '<div class="card p-4 flex justify-between items-center text-left"><div><p class="font-black text-gray-700">' + e.name + '</p><p class="text-gray-400 uppercase">NT$ ' + Math.round(e.cost * rate).toLocaleString() + ' • ' + e.payer + '</p></div><div class="flex items-center gap-3"><span class="font-black text-xl">¥' + e.cost.toLocaleString() + '</span><button onclick="delExp(' + rIdx + ')" class="text-stone-200 text-2xl">×</button></div></div>';
            }).join('');
            document.getElementById('totalSpend').innerText = total.toLocaleString(); document.getElementById('totalTWD').innerText = Math.round(total * rate).toLocaleString();
            document.getElementById('payerStats').innerHTML = Object.entries(payerTotals).map(([p, val]) => '<div class="bg-white p-2 rounded-2xl border border-amber-50 text-center"><p class="text-stone-400 uppercase">' + p + '</p><p class="font-black text-stone-700">¥' + val.toLocaleString() + '</p></div>').join('');
            document.getElementById('expPayer').innerHTML = db.payers.map(p => '<option value="' + p + '">' + p + '</option>').join('');
            document.getElementById('payerManagerList').innerHTML = db.payers.map((p, idx) => '<div class="bg-stone-100 px-4 py-1 rounded-full flex items-center gap-2">' + p + ' <button onclick="delPayerName(' + idx + ')">×</button></div>').join('');
            renderCheckList('bring', db.checkBring, 'bringList'); renderCheckList('buy', db.checkBuy, 'buyList');
        }
        function renderCheckList(type, list, containerId) { 
            const container = document.getElementById(containerId);
            container.innerHTML = list.map((item, idx) => '<div class="list-row"><div class="list-info" onclick="toggleCheck(\'' + type + '\',' + idx + ')"><i class="fa-solid ' + (item.done ? 'fa-square-check text-amber-500' : 'fa-square text-stone-100') + ' text-3xl flex-shrink-0"></i><span class="list-text ' + (item.done ? 'line-through text-stone-300' : '') + '">' + item.text + '</span></div><button class="list-del" onclick="delItem(\'' + type + '\',' + idx + ')">×</button></div>').join(''); 
        }
        async function updateWeather() {
            const container = document.getElementById('weatherContainer'); container.innerHTML = '<p class="w-full text-center opacity-40">抓取中...</p>';
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.18&longitude=136.90&hourly=temperature_2m,precipitation_probability,weathercode&forecast_days=1");
                const data = await res.json(); const now = new Date().getHours(); let html = '';
                for(let i=0; i<6; i++){
                    const tIdx = (now + i) % 24; const temp = Math.round(data.hourly.temperature_2m[tIdx]); const prob = data.hourly.precipitation_probability[tIdx]; const code = data.hourly.weathercode[tIdx];
                    let icon = 'fa-cloud'; if(code === 0) icon = 'fa-sun text-amber-500'; else if(code <= 3) icon = 'fa-cloud-sun text-stone-400';
                    html += '<div class="weather-item"><p class="font-black opacity-30">' + tIdx + ':00</p><i class="fa-solid ' + icon + ' text-2xl my-2"></i><p class="font-black">' + temp + '°</p><p class="text-blue-400">' + prob + '%</p></div>';
                }
                container.innerHTML = html;
            } catch(e) { container.innerHTML = '<p class="w-full text-center text-red-300">連線失敗</p>'; }
        }
        function openFlightModal() { const f = db.flightMain; document.getElementById('m-sum-airline').innerText = f.airline; document.getElementById('m-sum-dep').innerText = '去程：' + f.depDate + ' ' + f.depNo + ' (' + f.depFrom + '→' + f.depTo + ') ' + f.depTime + '-' + f.depArrTime; document.getElementById('m-sum-arr').innerText = '回程：' + f.arrDate + ' ' + f.arrNo + ' (' + f.arrFrom + '→' + f.arrTo + ') ' + f.arrTime + '-' + f.arrArrTime; renderPassengerCards(); openModal('flightModal'); }
        function renderPassengerCards() { document.getElementById('psgrCardList').innerHTML = db.passengers.map((p, idx) => '<div onclick="openPsgrEdit(' + idx + ')" class="card p-4 border border-stone-100 active:bg-amber-50 text-left"><p class="font-black text-amber-600 mb-1">' + p.name + '</p><div class="text-gray-400">PNR: ' + p.dep.pnr + ' | 去: ' + p.dep.seat + ' 回: ' + p.ret.seat + '</div><div class="text-stone-400">' + p.dep.meal + '</div></div>').join(''); }
        function openPsgrEdit(idx) { activePsgrIdx = idx; const p = db.passengers[idx]; document.getElementById('psgr-name').value = p.name; document.getElementById('psgr-dep-pnr').value = p.dep.pnr; document.getElementById('psgr-dep-seat').value = p.dep.seat; document.getElementById('psgr-dep-meal').value = p.dep.meal; document.getElementById('psgr-arr-pnr').value = p.ret.pnr; document.getElementById('psgr-arr-seat').value = p.ret.seat; document.getElementById('psgr-arr-meal').value = p.ret.meal; openModal('psgrEditModal'); }
        async function savePassengerDetails() { const idx = activePsgrIdx; db.passengers[idx] = { name: document.getElementById('psgr-name').value, dep: { pnr: document.getElementById('psgr-dep-pnr').value, seat: document.getElementById('psgr-dep-seat').value, meal: document.getElementById('psgr-dep-meal').value }, ret: { pnr: document.getElementById('psgr-arr-pnr').value, seat: document.getElementById('psgr-arr-seat').value, meal: document.getElementById('psgr-arr-meal').value } }; closeModal('psgrEditModal'); await pushData(); }
        function viewDetail(idx) { const it = db.itinerary[idx]; document.getElementById('viewContent').innerHTML = '<div class="text-left"><p class="font-black text-stone-300 uppercase">' + it.date + ' ' + it.time + '</p><h2 class="text-2xl font-black mb-4">' + it.title + '</h2><p class="text-blue-500 font-bold mb-4"><i class="fa-solid fa-location-dot"></i> ' + it.location + '</p><div class="bg-stone-50 p-6 rounded-3xl border text-lg">' + (it.note ? it.note.replace(/\n/g, '<br>') : '無備註') + '</div></div>'; document.getElementById('viewMapBtn').onclick = () => window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(it.location), "_blank"); document.getElementById('viewEditBtn').onclick = () => { closeModal('viewModal'); openEditItinerary(idx); }; document.getElementById('viewAiBtn').onclick = () => window.open("https://www.google.com/search?q=" + encodeURIComponent(it.location + " 附近美食"), "_blank"); document.getElementById('viewDelBtn').onclick = async () => { if(confirm("確定刪除？")) { db.itinerary.splice(idx, 1); await pushData(); closeModal('viewModal'); } }; openModal('viewModal'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openAddItinerary() { document.getElementById('itIdx').value = -1; document.querySelectorAll('#itineraryModal input, #itineraryModal textarea').forEach(i => i.value = ''); openModal('itineraryModal'); }
        function openEditItinerary(idx) { const it = db.itinerary[idx]; document.getElementById('itIdx').value = idx; document.getElementById('itDate').value = it.date; document.getElementById('itTime').value = it.time; document.getElementById('itHeading').value = it.title; document.getElementById('itLoc').value = it.location; document.getElementById('itDrive').value = it.driveInfo || ""; document.getElementById('itNote').value = it.note; openModal('itineraryModal'); }
        async function saveItinerary() { const idx = parseInt(document.getElementById('itIdx').value); const data = { date: document.getElementById('itDate').value, time: document.getElementById('itTime').value, title: document.getElementById('itHeading').value, location: document.getElementById('itLoc').value, driveInfo: document.getElementById('itDrive').value, note: document.getElementById('itNote').value }; if(idx === -1) db.itinerary.push(data); else db.itinerary[idx] = data; db.itinerary.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time)); closeModal('itineraryModal'); await pushData(); }
        async function addItem(type) { const inp = document.getElementById(type === 'bring' ? 'bringInput' : 'buyInput'); if(inp.value) { (type === 'bring' ? db.checkBring : db.checkBuy).push({text: inp.value, done: false}); inp.value = ''; await pushData(); } }
        async function toggleCheck(type, idx) { (type === 'bring' ? db.checkBring : db.checkBuy)[idx].done = !(type === 'bring' ? db.checkBring : db.checkBuy)[idx].done; await pushData(); }
        async function delItem(type, idx) { (type === 'bring' ? db.checkBring : db.checkBuy).splice(idx, 1); await pushData(); }
        async function addExp() { const n = document.getElementById('expName').value, c = parseFloat(document.getElementById('expCost').value), p = document.getElementById('expPayer').value; if(n && c) { db.expenses.push({name: n, cost: c, payer: p}); document.getElementById('expName').value = ''; document.getElementById('expCost').value = ''; await pushData(); } }
        async function delExp(idx) { db.expenses.splice(idx, 1); await pushData(); }
        async function addPayerName() { const n = document.getElementById('newPayer').value.trim(); if(n && !db.payers.includes(n)) { db.payers.push(n); await pushData(); } document.getElementById('newPayer').value = ''; }
        async function delPayerName(idx) { if(confirm("刪除？")) { db.payers.splice(idx, 1); await pushData(); } }
        function saveSettingsOnly() { db.rate = parseFloat(document.getElementById('exRate').value); saveLocal(); renderAll(); }
        function calcTWD(val) { const rate = parseFloat(document.getElementById('exRate').value) || 0.21; document.getElementById('quickTWD').innerText = "≈ NT$ " + Math.round(val * rate).toLocaleString(); }
        function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        function showSync(s) { document.getElementById('syncBar').style.transform = s ? 'scaleX(1)' : 'scaleX(0)'; }
        function editMainFlightSchedule() { const f = db.flightMain; document.getElementById('edit-airline').value = f.airline; document.getElementById('edit-dep-date').value = f.depDate; document.getElementById('edit-dep-no').value = f.depNo; document.getElementById('edit-dep-from').value = f.depFrom; document.getElementById('edit-dep-to').value = f.depTo; document.getElementById('edit-dep-time').value = f.depTime; document.getElementById('edit-dep-arr').value = f.depArrTime; document.getElementById('edit-arr-date').value = f.arrDate; document.getElementById('edit-arr-no').value = f.arrNo; document.getElementById('edit-arr-from').value = f.arrFrom; document.getElementById('edit-arr-to').value = f.arrTo; document.getElementById('edit-arr-time').value = f.arrTime; document.getElementById('edit-arr-arr').value = f.arrArrTime; openModal('mainFlightEditModal'); }
        async function saveMainFlightSchedule() { db.flightMain = { airline: document.getElementById('edit-airline').value, depDate: document.getElementById('edit-dep-date').value, depNo: document.getElementById('edit-dep-no').value, depFrom: document.getElementById('edit-dep-from').value, depTo: document.getElementById('edit-dep-to').value, depTime: document.getElementById('edit-dep-time').value, depArrTime: document.getElementById('edit-dep-arr').value, arrDate: document.getElementById('edit-arr-date').value, arrNo: document.getElementById('edit-arr-no').value, arrFrom: document.getElementById('edit-arr-from').value, arrTo: document.getElementById('edit-arr-to').value, arrTime: document.getElementById('edit-arr-time').value, arrArrTime: document.getElementById('edit-arr-arr').value }; closeModal('mainFlightEditModal'); openFlightModal(); await pushData(); }
        async function resetToDefault() { if(confirm("恢復備份？")) { db = JSON.parse(JSON.stringify(masterData)); await pushData(); } }
        init();
    </script>
</body>
</html>
