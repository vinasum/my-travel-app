<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.3 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --n-gold: #E6B422; --n-wago: #1A2A3A; --n-sakura: rgba(255, 192, 203, 0.12); 
        }
        body { 
            font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-wago); 
            background-image: radial-gradient(var(--n-sakura) 1.5px, transparent 1.5px);
            background-size: 24px 24px; color: #FFFFFF; text-align: left; margin: 0; min-height: 100vh;
        }
        /* 磨砂玻璃卡片 - 通用白色系 */
        .glass-card { 
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); color: #1F2937;
        }
        /* 磨砂玻璃卡片 - 深色系 (用於清單與設定) */
        .glass-card-dark {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 導航列 - 偏透明白磨砂質感 */
        nav {
            background: rgba(255, 255, 255, 0.18); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }
        .is-past { filter: grayscale(100%) opacity(0.4); transform: scale(0.97); }
        .muji-btn { 
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); 
            color: white; padding: 16px; border-radius: 18px; font-weight: 900; text-align: center; border: none; width: 100%; display: block;
        }
        /* 強制輸入框：白底黑字 */
        input, select, textarea { 
            width: 100%; border: 1px solid #CCC !important; border-radius: 14px; padding: 12px; margin-bottom: 8px; 
            outline: none; background: #FFFFFF !important; color: #111111 !important; font-size: 14px !important; font-weight: 500;
        }
        input::placeholder { color: #999; }
        .page { display: none; padding-bottom: 160px; }
        .page.active { display: block; }
        .nav-active { color: var(--n-gold) !important; filter: drop-shadow(0 0 8px rgba(230,180,34,0.5)); }
        .drive-container { margin-left: 32px; margin-top: -8px; margin-bottom: 16px; border-left: 2px dashed rgba(255,255,255,0.2); padding: 8px 0 8px 20px; }
        .drive-tag { background: rgba(255,255,255,0.1); color: #FFF; font-weight: 900; padding: 4px 12px; border-radius: 99px; font-size: 11px !important; }
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-text.done { text-decoration: line-through; opacity: 0.3; }
    </style>
</head>
<body class="max-w-md mx-auto relative px-5">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 9999; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    
    <header class="pt-10 pb-6 flex justify-between items-center text-left">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-white">名古屋旅程</h1>
            <i class="fa-solid fa-fish-fins text-amber-400 text-2xl rotate-45"></i>
        </div>
        <button onclick="pullData()" class="text-white/30 text-2xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main>
        <div id="page-itinerary" class="page active">
            <div onclick="openPassengerList()" class="glass-card p-5 border-t-8 border-amber-400">
                <div class="flex justify-between items-center mb-3"><h2 class="font-black text-xl text-gray-800" id="f-airline">載入中...</h2><i class="fa-solid fa-chevron-right text-gray-300"></i></div>
                <div class="space-y-3 text-gray-600 font-bold">
                    <div><p class="text-gray-800">去程：<span id="f-dep-date">--/--</span> <span id="f-dep-from">---</span> ✈️ <span id="f-dep-to">---</span></p><p class="text-xs opacity-60"><span id="f-dep-no">---</span> <span id="f-dep-time">--:--</span> → <span id="f-dep-arr-time">--:--</span></p></div>
                    <div><p class="text-gray-800">回程：<span id="f-arr-date">--/--</span> <span id="f-arr-from">---</span> ✈️ <span id="f-arr-to">---</span></p><p class="text-xs opacity-60"><span id="f-arr-no">---</span> <span id="f-arr-time">--:--</span> → <span id="f-arr-arr-time">--:--</span></p></div>
                </div>
            </div>
            <button onclick="openAddItinerary()" class="muji-btn my-4 shadow-xl">＋ 新增行程項目</button>
            <div id="itineraryList" class="space-y-0"></div>
        </div>

        <div id="page-items" class="page">
            <h2 class="font-black mb-4 text-xl">清單項目</h2>
            <div class="glass-card-dark border-t-4 border-blue-400">
                <h3 class="font-black text-blue-300 mb-3">要攜帶</h3>
                <div class="flex gap-2 mb-4"><input id="bringInput" type="text" placeholder="帶什麼？"><button onclick="addItem('bring')" class="muji-btn w-auto px-6 bg-blue-600">＋</button></div>
                <div id="bringList"></div>
            </div>
            <div class="glass-card-dark border-t-4 border-red-400">
                <h3 class="font-black text-red-300 mb-3">要購買</h3>
                <div class="flex gap-2 mb-4"><input id="buyInput" type="text" placeholder="買什麼？"><button onclick="addItem('buy')" class="muji-btn w-auto px-6 bg-red-600">＋</button></div>
                <div id="buyList"></div>
            </div>
        </div>

        <div id="page-budget" class="page">
            <div class="glass-card p-5 mb-4">
                <h3 class="font-black text-gray-400 mb-2 text-xs uppercase">＋ 新增支出</h3>
                <input id="expName" type="text" placeholder="品項名稱">
                <div class="grid grid-cols-2 gap-2">
                    <input id="expCost" type="number" placeholder="日圓 ¥">
                    <select id="expPayer"></select>
                </div>
                <button onclick="addExp()" class="muji-btn mt-2 py-3">儲存紀錄</button>
            </div>
            <div class="glass-card-dark text-center py-6 mb-4">
                <div class="text-4xl font-black text-amber-400">¥ <span id="totalSpend">0</span></div>
                <p class="opacity-40 text-xs mt-1">≈ NT$ <span id="totalTWD">0</span> (匯率 <span id="dispRate">0.21</span>)</p>
            </div>
            <div id="payerStats" class="grid grid-cols-3 gap-2 mb-6"></div>
            <div id="expList" class="space-y-2"></div>
        </div>

        <div id="page-tools" class="page">
            <h2 class="font-black mb-4 text-xl text-amber-400">設定與管理</h2>
            <div class="glass-card-dark">
                <p class="font-black text-xs opacity-50 mb-2">匯率設定</p>
                <input id="exRate" type="number" step="0.001" onchange="saveSettingsOnly()">
            </div>
            <div class="glass-card-dark">
                <p class="font-black text-xs opacity-50 mb-2">名單管理</p>
                <div class="flex gap-2 mb-4"><input id="newPayer" type="text" placeholder="姓名"><button onclick="addPayerName()" class="muji-btn w-auto px-4">+</button></div>
                <div id="payerManagerList" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="glass-card-dark">
                <p class="font-black text-xs opacity-50 mb-2">航班主體設定</p>
                <button onclick="openFlightEdit()" class="w-full py-4 bg-white/10 rounded-xl font-bold border border-white/10">手動修改航班資訊</button>
            </div>
            <button onclick="resetToDefault()" class="w-full py-4 mt-10 text-red-400/50 font-bold border border-red-400/20 rounded-2xl">🆘 恢復備份 (清除所有數據)</button>
            <p class="text-center opacity-20 text-[10px] mt-4">v9.3 Stable | Nagoya 2026</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-around py-3 pb-8 z-50">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="text-white/40 flex flex-col items-center nav-active"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[10px] font-bold mt-1">行程</span></button>
        <button onclick="switchPage('items')" id="nav-items" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-list-check text-xl"></i><span class="text-[10px] font-bold mt-1">清單</span></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-coins text-xl"></i><span class="text-[10px] font-bold mt-1">記帳</span></button>
        <button onclick="switchPage('tools')" id="nav-tools" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[10px] font-bold mt-1">設定</span></button>
    </nav>

    <div id="itineraryModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-[300]"><div class="glass-card w-full p-6 h-[85vh] overflow-y-auto"><h3>編輯行程</h3><input type="hidden" id="itIdx"><input id="itDate" type="date"><input id="itTime" type="time"><input id="itDrive" placeholder="🚗 下一站車程"><input id="itHeading" placeholder="行程名稱"><input id="itLoc" placeholder="地點"><textarea id="itNote" placeholder="備註" style="height:120px"></textarea><button onclick="saveItinerary()" class="muji-btn mt-4">儲存</button><button onclick="closeModal('itineraryModal')" class="w-full py-4 text-gray-400">取消</button></div></div>
    <div id="flightEditModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-[300]"><div class="glass-card w-full p-6 h-[85vh] overflow-y-auto"><h3>航班設定</h3><input id="in-airline" placeholder="航空公司"><div class="grid grid-cols-2 gap-2 mt-2"><input id="in-dep-from"><input id="in-dep-to"><input id="in-dep-date" type="date"><input id="in-dep-no"><input id="in-dep-time" type="time"><input id="in-dep-arr-time" type="time"></div><div class="grid grid-cols-2 gap-2 mt-4"><input id="in-arr-from"><input id="in-arr-to"><input id="in-arr-date" type="date"><input id="in-arr-no"><input id="in-arr-time" type="time"><input id="in-arr-arr-time" type="time"></div><button onclick="saveFlightMain()" class="muji-btn mt-4">儲存</button><button onclick="closeModal('flightEditModal')" class="w-full py-4 text-gray-400">取消</button></div></div>
    <div id="psgrListModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300]"><div class="glass-card w-full p-6 h-[70vh] overflow-y-auto relative"><button onclick="closeModal('psgrListModal')" class="absolute top-4 right-4 text-xl">×</button><h3 class="font-black text-xl mb-4">旅客</h3><div id="psgrContainer" class="space-y-3"></div></div></div>
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full opacity-0 transition-all z-[9999] pointer-events-none"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyygnjaryM3s4Zf9XSnVStWNhBpwUoFrdJp1jX2-IFmYzglxlfdd_enycNmW5Y_92ejfg/exec';
        const DB_KEY = 'vina_travel_v9_3';
        const masterData = {
            flightMain: { airline: "星宇航空", depFrom: "TPE", depTo: "NGO", depDate: "2026-05-23", depNo: "JX830", depTime: "10:00", depArrTime: "14:00", arrFrom: "NGO", arrTo: "TPE", arrDate: "2026-05-29", arrNo: "JX831", arrTime: "16:35", arrArrTime: "20:30" },
            passengers: Array(5).fill().map((_, i) => ({ name: "旅客 " + (i+1), pnr: "VINA88", seat: "--", meal: "--" })),
            itinerary: [{ date: "2026-05-23", time: "15:30", driveTime: "45min", title: "抵達 & 取車", location: "NGO Airport", note: "" }],
            checkBring: [{text:"護照", done:false}], checkBuy: [], expenses: [], payers: ["薇那", "大人B", "大人C"], rate: 0.21
        };
        let db = JSON.parse(JSON.stringify(masterData));

        function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active')); document.getElementById('nav-' + p).classList.add('nav-active'); }
        
        function init() { 
            try { 
                const local = localStorage.getItem(DB_KEY); 
                if (local) { db = { ...masterData, ...JSON.parse(local) }; }
                document.getElementById('exRate').value = db.rate;
                renderAll(); 
            } catch(e) { renderAll(); } 
        }

        function saveLocal() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
        async function pushData() { showSync(true); saveLocal(); renderAll(); try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(db) }); } catch(e){} showSync(false); }
        async function pullData() { showSync(true); try { const res = await fetch(GOOGLE_SCRIPT_URL); const data = await res.json(); if(data && data.itinerary) { db = data; saveLocal(); renderAll(); toast("🏮 同步成功"); } } catch (e) { toast("同步失敗"); } showSync(false); }

        function renderAll() {
            try {
                const today = "2026-04-08"; 
                const f = db.flightMain;
                document.getElementById('f-airline').innerText = f.airline;
                document.getElementById('f-dep-date').innerText = f.depDate.replace('2026-', '');
                document.getElementById('f-arr-date').innerText = f.arrDate.replace('2026-', '');
                document.getElementById('f-dep-from').innerText = f.depFrom; document.getElementById('f-dep-to').innerText = f.depTo;
                document.getElementById('f-dep-no').innerText = f.depNo; document.getElementById('f-dep-time').innerText = f.depTime; document.getElementById('f-dep-arr-time').innerText = f.depArrTime;
                document.getElementById('f-arr-from').innerText = f.arrFrom; document.getElementById('f-arr-to').innerText = f.arrTo;
                document.getElementById('f-arr-no').innerText = f.arrNo; document.getElementById('f-arr-time').innerText = f.arrTime; document.getElementById('f-arr-arr-time').innerText = f.arrArrTime;

                db.itinerary.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
                const itList = document.getElementById('itineraryList'); itList.innerHTML = '';
                db.itinerary.forEach((it, idx) => {
                    const isPast = it.date < today ? "is-past" : "";
                    itList.innerHTML += `<div onclick="viewDetail(${idx})" class="glass-card p-6 border-l-[8px] border-amber-400 ${isPast}">
                        <span class="font-black text-gray-400 text-xs">${it.date.replace('2026-', '')} ${it.time}</span>
                        <h3 class="font-black text-gray-800 mt-1 text-lg">${it.title || '(未命名)'}</h3>
                        <p class="text-blue-600 font-bold mt-1 text-sm">${it.location || ''}</p></div>`;
                    if (it.driveTime && idx < db.itinerary.length - 1) {
                        itList.innerHTML += `<div class="drive-container ${isPast}"><div class="drive-tag">🚗 ${it.driveTime}</div></div>`;
                    }
                });

                const rate = db.rate || 0.21; let total = 0; const ps = {}; db.payers.forEach(p => ps[p] = 0);
                document.getElementById('expList').innerHTML = db.expenses.slice().reverse().map((e, i) => { 
                    total += e.cost; ps[e.payer] += e.cost; 
                    return `<div class="glass-card p-4 flex justify-between items-center"><div><p class="font-black text-gray-800">${e.name}</p><p class="opacity-40 text-xs">${Math.round(e.cost * rate)} TWD • ${e.payer}</p></div><span class="font-black text-xl text-gray-800">¥${e.cost.toLocaleString()}</span></div>`; 
                }).join('');
                document.getElementById('totalSpend').innerText = total.toLocaleString(); 
                document.getElementById('totalTWD').innerText = Math.round(total * rate).toLocaleString();
                document.getElementById('dispRate').innerText = rate;
                document.getElementById('payerStats').innerHTML = Object.entries(ps).map(([p, v]) => `<div class="bg-white/10 p-2 rounded-xl text-center"><p class="opacity-40 text-[10px] uppercase">${p}</p><p class="font-black">¥${v.toLocaleString()}</p></div>`).join('');
                document.getElementById('expPayer').innerHTML = db.payers.map(p => `<option value="${p}">${p}</option>`).join('');
                document.getElementById('payerManagerList').innerHTML = db.payers.map((p, i) => `<div class="bg-white/10 px-4 py-1 rounded-full text-sm">${p} <button onclick="delPayerName(${i})">×</button></div>`).join('');
                renderCheckList('bring', db.checkBring, 'bringList'); renderCheckList('buy', db.checkBuy, 'buyList');
            } catch(e) { console.error(e); }
        }

        function renderCheckList(t, list, cid) {
            document.getElementById(cid).innerHTML = list.map((item, idx) => `<div class="list-row"><div class="list-content flex items-center gap-4 flex-grow" onclick="toggleCheck('${t}',${idx})"><i class="fa-solid ${item.done ? 'fa-square-check text-amber-500' : 'fa-square text-white/20'} text-2xl"></i><span class="list-text ${item.done ? 'done' : ''}">${item.text}</span></div><button onclick="delItem('${t}',${idx})" class="opacity-20 ml-4">×</button></div>`).join('');
        }

        async function addItem(t) { const inp = document.getElementById(t + 'Input'); if(inp.value) { db[t === 'bring' ? 'checkBring' : 'checkBuy'].push({text: inp.value, done: false}); inp.value = ''; await pushData(); } }
        async function toggleCheck(t, i) { const list = db[t === 'bring' ? 'checkBring' : 'checkBuy']; list[i].done = !list[i].done; await pushData(); }
        async function delItem(t, i) { db[t === 'bring' ? 'checkBring' : 'checkBuy'].splice(i, 1); await pushData(); }
        async function addExp() { const n = document.getElementById('expName').value, c = parseFloat(document.getElementById('expCost').value), p = document.getElementById('expPayer').value; if(n && c) { db.expenses.push({name: n, cost: c, payer: p}); document.getElementById('expName').value=''; document.getElementById('expCost').value=''; await pushData(); } }
        async function addPayerName() { const n = document.getElementById('newPayer').value.trim(); if(n && !db.payers.includes(n)) { db.payers.push(n); document.getElementById('newPayer').value=''; await pushData(); } }
        function delPayerName(i) { if(confirm("刪除此人？")) { db.payers.splice(i,1); saveLocal(); renderAll(); } }
        function saveSettingsOnly() { db.rate = parseFloat(document.getElementById('exRate').value); saveLocal(); renderAll(); }
        function openFlightEdit() { const f = db.flightMain; document.getElementById('in-airline').value = f.airline; document.getElementById('in-dep-date').value = f.depDate; document.getElementById('in-arr-date').value = f.arrDate; openModal('flightEditModal'); }
        async function saveFlightMain() { db.flightMain.airline = document.getElementById('in-airline').value; db.flightMain.depDate = document.getElementById('in-dep-date').value; db.flightMain.arrDate = document.getElementById('in-arr-date').value; closeModal('flightEditModal'); await pushData(); }
        function openAddItinerary() { document.querySelectorAll('#itineraryModal input, #itineraryModal textarea').forEach(i => i.value = ''); document.getElementById('itIdx').value = "-1"; openModal('itineraryModal'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        function showSync(s) { document.getElementById('syncBar').style.transform = s ? 'scaleX(1)' : 'scaleX(0)'; }
        async function resetToDefault() { if(confirm("確定重置所有數據？此動作無法復原。")) { localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</html>
