<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --n-gold: #E6B422; /* 金鯱黃 */
            --n-wago: #1A2A3A; /* 和風藍青色 */
            --n-sakura: rgba(255, 192, 203, 0.1); /* 櫻花粉 (極淡) */
        }
        
        body { 
            font-size: 16px; 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--n-wago); 
            /* 櫻花背景圖案 (使用簡單圖形模擬) */
            background-image: 
                radial-gradient(var(--n-sakura) 2px, transparent 2px),
                radial-gradient(var(--n-sakura) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #FFFFFF; 
            text-align: left; 
            margin: 0; 
            min-height: 100vh;
        }

        /* 磨砂玻璃卡片 */
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; 
            margin-bottom: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* 過去行程：灰階且半透明 */
        .is-past { 
            filter: grayscale(100%) opacity(0.5); 
            transform: scale(0.98);
        }

        .muji-btn { 
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); 
            color: white; padding: 16px; border-radius: 18px; 
            font-weight: 700; text-align: center; cursor: pointer; border: none; width: 100%; display: block; 
        }

        .page { display: none; padding-bottom: 150px; }
        .page.active { display: block; }
        .nav-active { color: var(--n-gold) !important; font-weight: 900 !important; }

        /* 車程標籤與線條 */
        .drive-container { margin-left: 32px; margin-top: -8px; margin-bottom: 16px; border-left: 2px dashed rgba(255,255,255,0.3); padding: 12px 0 12px 20px; }
        .drive-tag { background: rgba(255,255,255,0.1); color: #FFF; font-weight: 900; padding: 4px 12px; border-radius: 99px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px !important; }

        /* 分頁文字樣式 */
        .nav-text { font-size: 10px !important; font-weight: 700; margin-top: 2px; }

        input, select, textarea { width: 100%; border: 1px solid #ddd; border-radius: 16px; padding: 14px; margin-bottom: 10px; outline: none; background: #fff; color: #333; }
        
        .weather-scroll { display: flex; overflow-x: auto; gap: 10px; }
        .weather-item { flex: 0 0 calc(33.33% - 7px); text-align: center; background: rgba(255,255,255,0.1); padding: 10px 5px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="max-w-md mx-auto relative px-5">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 9999; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    
    <header class="pt-10 pb-6 flex justify-between items-center text-left">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-black text-white">名古屋旅程</h1>
            <i class="fa-solid fa-fish-fins text-amber-400 text-2xl rotate-45" title="金鯱"></i>
        </div>
        <button onclick="pullData()" class="text-white/30 text-2xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main>
        <div id="page-itinerary" class="page active">
            <div onclick="openPassengerList()" class="glass-card p-5 border-t-8 border-amber-400">
                <div class="flex justify-between items-center mb-4"><h2 class="font-black text-xl text-gray-800" id="f-airline">載入中...</h2><i class="fa-solid fa-chevron-right text-gray-400"></i></div>
                <div class="space-y-4 text-gray-700">
                    <div>
                        <p class="font-black text-[15px]">去程：<span id="f-dep-date">--/--</span> <span id="f-dep-from">---</span> <i class="fa-solid fa-plane text-blue-500 mx-1"></i> <span id="f-dep-to">---</span></p>
                        <p class="font-bold opacity-60"><span id="f-dep-no">---</span> <span id="f-dep-time">--:--</span> → <span id="f-dep-arr-time">--:--</span></p>
                    </div>
                    <div>
                        <p class="font-black text-[15px]">回程：<span id="f-arr-date">--/--</span> <span id="f-arr-from">---</span> <i class="fa-solid fa-plane text-red-500 mx-1"></i> <span id="f-arr-to">---</span></p>
                        <p class="font-bold opacity-60"><span id="f-arr-no">---</span> <span id="f-arr-time">--:--</span> → <span id="f-arr-arr-time">--:--</span></p>
                    </div>
                </div>
            </div>

            <div class="glass-card p-4 bg-white/10 border-none mt-4">
                <div class="flex justify-between items-center mb-3">
                    <span class="font-black text-white/50 text-[12px]">WEATHER (6H)</span>
                    <button onclick="updateWeather()" class="text-amber-400 font-bold text-[12px]">手動更新</button>
                </div>
                <div id="weatherContainer" class="weather-scroll text-white"><p class="w-full text-center opacity-40 py-2 text-sm">按更新載入...</p></div>
            </div>

            <button onclick="openAddItinerary()" class="muji-btn my-4 shadow-xl">＋ 新增行程項目</button>
            <div id="itineraryList" class="space-y-0"></div>
            <button onclick="resetToDefault()" class="w-full py-4 mt-20 text-white/20 font-black border border-white/10 rounded-2xl">🆘 恢復備份 (重整數據)</button>
        </div>

        <div id="page-budget" class="page">
            <div class="glass-card p-6 bg-gray-900/80 text-white text-center mb-4">
                <div class="text-4xl font-black text-amber-400">¥ <span id="totalSpend">0</span></div>
                <p class="opacity-50 mt-1 font-bold">≈ NT$ <span id="totalTWD">0</span></p>
            </div>
            <div id="payerStats" class="grid grid-cols-3 gap-2 mb-4"></div>
            <div class="glass-card p-4"><input id="expName" type="text" placeholder="品項"><input id="expCost" type="number" placeholder="金額(JPY)"><select id="expPayer"></select><button onclick="addExp()" class="muji-btn mt-2 py-3">儲存</button></div>
            <div id="expList" class="space-y-2 mt-4"></div>
        </div>

        <div id="page-items" class="page"><h2 class="font-black mb-4 text-xl">清單</h2><div id="bringList" class="glass-card p-4 mb-4 text-gray-800"></div><div id="buyList" class="glass-card p-4 text-gray-800"></div></div>
        <div id="page-tools" class="page"><h2 class="font-black mb-6 text-xl">設定</h2><div class="glass-card p-6 text-gray-800">匯率：<input id="exRate" type="number" value="0.21" step="0.001" onchange="saveSettingsOnly()" class="text-amber-600 font-bold"></div></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900/90 backdrop-blur-xl border-t border-white/10 flex justify-around py-3 pb-8 z-50">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="text-white/40 flex flex-col items-center nav-active"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="nav-text">行程</span></button>
        <button onclick="switchPage('items')" id="nav-items" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-list-check text-xl"></i><span class="nav-text">清單</span></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-coins text-xl"></i><span class="nav-text">記帳</span></button>
        <button onclick="switchPage('tools')" id="nav-tools" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-user-gear text-xl"></i><span class="nav-text">設定</span></button>
    </nav>

    <div id="itineraryModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300] text-left"><div class="glass-card w-full p-6 h-[85vh] overflow-y-auto text-gray-800"><h3>編輯行程</h3><input type="hidden" id="itIdx"><input id="itDate" type="date"><input id="itTime" type="time"><input id="itDrive" type="text" placeholder="🚗 下一站車程 (例如 45min)"><input id="itHeading" type="text" placeholder="行程名稱"><input id="itLoc" type="text" placeholder="地點"><textarea id="itNote" placeholder="備註" style="height:120px"></textarea><button onclick="saveItinerary()" class="muji-btn mt-4">儲存</button><button onclick="closeModal('itineraryModal')" class="w-full py-4 text-gray-400">取消</button></div></div>
    <div id="viewModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[200] text-left"><div class="glass-card w-full p-8 relative text-gray-800"><button onclick="closeModal('viewModal')" class="absolute top-6 right-6 text-2xl">×</button><div id="viewContent"></div><div class="mt-8 space-y-4"><button id="viewMapBtn" class="w-full py-6 bg-blue-600 text-white rounded-3xl font-black">導航</button><div class="grid grid-cols-2 gap-4"><button id="viewEditBtn" class="py-4 bg-stone-100 rounded-2xl font-bold">編輯</button><button id="viewDelBtn" class="py-4 bg-red-50 text-red-400 rounded-2xl font-bold">刪除</button></div></div></div></div>
    <div id="psgrListModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300]"><div class="glass-card w-full p-6 h-[80vh] overflow-y-auto text-gray-800 relative"><button onclick="closeModal('psgrListModal')" class="absolute top-4 right-4">×</button><h3 class="font-black text-xl mb-6">旅客資訊</h3><div id="psgrContainer" class="space-y-3"></div></div></div>
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full opacity-0 transition-opacity z-[9999] pointer-events-none"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyygnjaryM3s4Zf9XSnVStWNhBpwUoFrdJp1jX2-IFmYzglxlfdd_enycNmW5Y_92ejfg/exec';
        const DB_KEY = 'vina_travel_v9_1';
        const WEATHER_CACHE_KEY = 'vina_weather_cache';
        const masterData = {
            flightMain: { airline: "星宇航空", depFrom: "TPE", depTo: "NGO", depDate: "2026-05-23", depNo: "JX830", depTime: "10:00", depArrTime: "14:00", arrFrom: "NGO", arrTo: "TPE", arrDate: "2026-05-29", arrNo: "JX831", arrTime: "16:35", arrArrTime: "20:30" },
            passengers: Array(5).fill().map((_, i) => ({ name: "旅客 " + (i+1), pnr: "VINA88", seat: "--", meal: "--" })),
            itinerary: [
                { date: "2026-05-23", time: "15:30", driveTime: "45min", title: "抵達機場 & 取車", location: "中部國際機場(NGO)", note: "" },
                { date: "2026-05-23", time: "18:30", driveTime: "", title: "入住 & 味噌豬排", location: "矢場とん 栄瓦町店", note: "" }
            ],
            checkBring: [{text:"護照", done:false}], checkBuy: [], expenses: [], payers: ["薇那", "大人B", "大人C"], rate: 0.21
        };
        let db = JSON.parse(JSON.stringify(masterData));

        function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active')); document.getElementById('nav-' + p).classList.add('nav-active'); }
        
        function init() { 
            try { 
                const local = localStorage.getItem(DB_KEY); 
                if (local) { db = Object.assign({}, masterData, JSON.parse(local)); }
                const wCache = localStorage.getItem(WEATHER_CACHE_KEY); 
                if(wCache) document.getElementById('weatherContainer').innerHTML = wCache; 
                renderAll(); 
            } catch(e) { renderAll(); } 
        }

        async function pullData() { showSync(true); try { const res = await fetch(GOOGLE_SCRIPT_URL); const data = await res.json(); if(data && data.itinerary) { db = data; saveLocal(); renderAll(); toast("🏮 同步成功"); } } catch (e) { toast("同步失敗"); } showSync(false); }
        async function pushData() { showSync(true); saveLocal(); renderAll(); try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(db) }); } catch(e){} showSync(false); }
        function saveLocal() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        function renderAll() {
            try {
                const todayStr = "2026-04-08"; 
                const f = db.flightMain || masterData.flightMain;
                document.getElementById('f-airline').innerText = f.airline;
                document.getElementById('f-dep-date').innerText = f.depDate.replace('2026-', '');
                document.getElementById('f-arr-date').innerText = f.arrDate.replace('2026-', '');
                document.getElementById('f-dep-from').innerText = f.depFrom; document.getElementById('f-dep-to').innerText = f.depTo;
                document.getElementById('f-dep-no').innerText = f.depNo; document.getElementById('f-dep-time').innerText = f.depTime; document.getElementById('f-dep-arr-time').innerText = f.depArrTime;
                document.getElementById('f-arr-from').innerText = f.arrFrom; document.getElementById('f-arr-to').innerText = f.arrTo;
                document.getElementById('f-arr-no').innerText = f.arrNo; document.getElementById('f-arr-time').innerText = f.arrTime; document.getElementById('f-arr-arr-time').innerText = f.arrArrTime;

                db.itinerary.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
                const itList = document.getElementById('itineraryList'); itList.innerHTML = '';
                db.itinerary.forEach((it, idx) => {
                    const isPast = it.date < todayStr ? "is-past" : "";
                    itList.innerHTML += `<div onclick="viewDetail(${idx})" class="glass-card p-6 border-l-[8px] border-amber-400 ${isPast}">
                        <span class="font-black text-gray-500 uppercase text-[14px]">${it.date.replace('2026-', '')} ${it.time}</span>
                        <h3 class="font-black text-gray-800 mt-1 text-[18px]">${it.title || '(未命名)'}</h3>
                        <p class="text-blue-600 font-bold mt-1 text-[14px]">${it.location || ''}</p>
                    </div>`;
                    if (it.driveTime && idx < db.itinerary.length - 1) {
                        itList.innerHTML += `<div class="drive-container ${isPast}"><div class="drive-tag"><i class="fa-solid fa-car"></i> ${it.driveTime}</div></div>`;
                    }
                });

                const rate = db.rate || 0.21; let total = 0; const ps = {}; (db.payers||[]).forEach(p => ps[p] = 0);
                document.getElementById('expList').innerHTML = (db.expenses||[]).slice().reverse().map((e, i) => { total += e.cost; ps[e.payer] += e.cost; return `<div class="glass-card p-4 flex justify-between items-center text-gray-800"><div><p class="font-black">${e.name}</p><p class="opacity-50 text-[12px]">${Math.round(e.cost * rate)} TWD • ${e.payer}</p></div><div class="flex items-center gap-3"><span class="font-black text-xl">¥${e.cost.toLocaleString()}</span><button onclick="delExp(${db.expenses.length - 1 - i})" class="text-gray-300">×</button></div></div>`; }).join('');
                document.getElementById('totalSpend').innerText = total.toLocaleString(); document.getElementById('totalTWD').innerText = Math.round(total * rate).toLocaleString();
                document.getElementById('payerStats').innerHTML = Object.entries(ps).map(([p, v]) => `<div class="bg-white/10 p-2 rounded-2xl text-center"><p class="opacity-40 text-[10px] uppercase">${p}</p><p class="font-black">¥${v.toLocaleString()}</p></div>`).join('');
                document.getElementById('expPayer').innerHTML = (db.payers||[]).map(p => `<option value="${p}">${p}</option>`).join('');
            } catch(e) { console.error(e); }
        }

        async function updateWeather() {
            document.getElementById('weatherContainer').innerHTML = '<p class="w-full text-center py-2">抓取中...</p>';
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.18&longitude=136.90&hourly=temperature_2m,weathercode&forecast_days=1");
                const data = await res.json(); const now = new Date().getHours(); let html = '';
                for(let i=0; i<6; i++){ const tIdx = (now + i) % 24; const temp = Math.round(data.hourly.temperature_2m[tIdx]); html += `<div class="weather-item"><p class="opacity-40 text-[10px]">${tIdx}:00</p><i class="fa-solid fa-cloud text-xl my-1"></i><p class="font-black">${temp}°</p></div>`; }
                document.getElementById('weatherContainer').innerHTML = html; localStorage.setItem(WEATHER_CACHE_KEY, html);
            } catch(e) { toast("更新失敗"); }
        }

        function openAddItinerary() { 
            document.querySelectorAll('#itineraryModal input, #itineraryModal textarea').forEach(i => i.value = ''); 
            document.getElementById('itIdx').value = "-1"; openModal('itineraryModal'); 
        }

        function openEditItinerary(idx) { 
            const it = db.itinerary[idx]; document.getElementById('itIdx').value = idx; 
            document.getElementById('itDate').value = it.date; document.getElementById('itTime').value = it.time; 
            document.getElementById('itDrive').value = it.driveTime || ""; document.getElementById('itHeading').value = it.title || ""; 
            document.getElementById('itLoc').value = it.location || ""; document.getElementById('itNote').value = it.note || ""; openModal('itineraryModal'); 
        }

        async function saveItinerary() {
            const idx = document.getElementById('itIdx').value;
            const data = { date: document.getElementById('itDate').value, time: document.getElementById('itTime').value, driveTime: document.getElementById('itDrive').value, title: document.getElementById('itHeading').value, location: document.getElementById('itLoc').value, note: document.getElementById('itNote').value };
            if(idx === "-1") db.itinerary.push(data); else db.itinerary[idx] = data;
            closeModal('itineraryModal'); await pushData();
        }

        function viewDetail(idx) {
            const it = db.itinerary[idx];
            document.getElementById('viewContent').innerHTML = `<p class="opacity-40 font-black uppercase">${it.date.replace('2026-', '')} ${it.time}</p><h2 class="text-2xl font-black mb-2">${it.title || '未命名'}</h2><p class="text-blue-600 font-bold mb-6">${it.location || ''}</p><div class="bg-stone-50 p-6 rounded-3xl text-lg">${(it.note || '').replace(/\n/g, '<br>')}</div>`;
            document.getElementById('viewMapBtn').onclick = () => window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(it.location));
            document.getElementById('viewEditBtn').onclick = () => { closeModal('viewModal'); openEditItinerary(idx); };
            document.getElementById('viewDelBtn').onclick = () => { if(confirm("確定刪除行程？")) { db.itinerary.splice(idx,1); pushData(); closeModal('viewModal'); }};
            openModal('viewModal');
        }

        function openPassengerList() { renderPsgrList(); openModal('psgrListModal'); }
        function renderPsgrList() { document.getElementById('psgrContainer').innerHTML = db.passengers.map((p, i) => `<div class="p-4 glass-card bg-stone-50/80"><p class="font-black text-lg">${p.name}</p><p class="text-amber-600 font-bold">${p.pnr}</p><div class="flex gap-4 opacity-50 text-xs mt-2"><span>座: ${p.seat}</span><span>餐: ${p.meal}</span></div></div>`).join(''); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        async function addExp() { const n = document.getElementById('expName').value, c = parseFloat(document.getElementById('expCost').value), p = document.getElementById('expPayer').value; if(n && c) { db.expenses.push({name: n, cost: c, payer: p}); await pushData(); } }
        async function delExp(i) { db.expenses.splice(i, 1); await pushData(); }
        async function resetToDefault() { if(confirm("確定清除本地緩存？")) { localStorage.clear(); location.reload(); } }
        function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        function showSync(s) { document.getElementById('syncBar').style.transform = s ? 'scaleX(1)' : 'scaleX(0)'; }
        init();
    </script>
</body>
</html>
