<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nagoya Travel v10.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --n-gold: #E6B422; --n-wago: #1A2A3A; --n-sakura: rgba(255, 192, 203, 0.3); }
        
        body { 
            font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-wago); 
            /* 1.1 加大櫻花背景 */
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 45c-2 0-5-2-5-5s3-5 5-5 5 2 5 5-3 5-5 5zm0-15c0-5-3-10-8-10s-5 5-5 10 3 10 8 10 5-5 5-10zm-15 15c-5 0-10 3-10 8s5 5 10 5 10-3 10-8-5-5-10-5zm0-12c-5 0-10-3-10-8s5-5 10-5 10 3 10 8-5 5-10 5zm25 12c5 0 10 3 10 8s-5 5-10 5-10-3-10-8 5-5 10-5z' fill='%23ffc0cb' fill-opacity='0.15'/%3E%3C/svg%3E");
            color: #FFFFFF; text-align: left; margin: 0; min-height: 100vh;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.2); 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); color: #1F2937; 
        }

        .glass-card-dark { 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* 1.3 導覽列：偏白磨砂 */
        nav { 
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-top: 1px solid rgba(255, 255, 255, 0.2); z-index: 100; 
        }

        .is-past { filter: grayscale(100%) opacity(0.4); transform: scale(0.97); }
        .muji-btn { background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); color: white; padding: 16px; border-radius: 18px; font-weight: 900; text-align: center; border: none; width: 100%; display: block; cursor: pointer; }
        
        /* 3.3 白底黑字輸入框 */
        label { display: block; font-size: 12px; font-weight: 900; color: var(--n-gold); margin-bottom: 4px; margin-top: 8px; }
        input, select, textarea { width: 100%; border: 1px solid #CCC !important; border-radius: 14px; padding: 12px; margin-bottom: 8px; outline: none; background: #FFFFFF !important; color: #111 !important; font-size: 14px !important; }

        .page { display: none; padding-bottom: 160px; }
        .page.active { display: block; }
        .nav-active { color: var(--n-gold) !important; font-weight: 900 !important; }
        
        .drive-container { margin-left: 32px; margin-top: -8px; margin-bottom: 16px; border-left: 2px dashed rgba(255,255,255,0.2); padding: 8px 0 8px 20px; }
        .drive-tag { background: rgba(255,255,255,0.1); color: #FFF; font-weight: 900; padding: 4px 12px; border-radius: 99px; font-size: 11px !important; }
        
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-text.done { text-decoration: line-through; opacity: 0.3; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
        #weatherContainer::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto relative px-5">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 1000; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    
    <header class="pt-10 pb-6 flex justify-between items-center text-left">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-white">名古屋旅程</h1>
            <i class="fa-solid fa-fish-fins text-amber-400 text-2xl rotate-45"></i>
        </div>
        <button onclick="pullData()" class="text-white/30 text-2xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main>
        <div id="page-itinerary" class="page active">
            <div onclick="openPassengerList()" class="glass-card p-5 border-t-8 border-amber-400 cursor-pointer active:scale-95 transition-transform">
                <div class="flex justify-between items-center mb-3"><h2 class="font-black text-xl text-gray-800" id="f-airline">載入中...</h2><i class="fa-solid fa-chevron-right text-gray-300"></i></div>
                <div class="space-y-3 text-gray-600 font-bold">
                    <div><p class="text-gray-800">去程：<span id="f-dep-date">--/--</span> <span id="f-dep-from">---</span> ✈️ <span id="f-dep-to">---</span></p><p class="text-xs opacity-60"><span id="f-dep-no">---</span> <span id="f-dep-time">--:--</span> → <span id="f-dep-arr-time">--:--</span></p></div>
                    <div><p class="text-gray-800">回程：<span id="f-arr-date">--/--</span> <span id="f-arr-from">---</span> ✈️ <span id="f-arr-to">---</span></p><p class="text-xs opacity-60"><span id="f-arr-no">---</span> <span id="f-arr-time">--:--</span> → <span id="f-arr-arr-time">--:--</span></p></div>
                </div>
            </div>
            <div class="glass-card-dark mt-4">
                <div class="flex justify-between items-center mb-2"><span class="text-xs opacity-50 font-black">WEATHER (6H)</span><button onclick="updateWeather()" class="text-amber-400 text-xs font-black">更新</button></div>
                <div id="weatherContainer" class="flex overflow-x-auto gap-4 py-2"></div>
            </div>
            <button onclick="openAddItinerary()" class="muji-btn my-4 shadow-xl">＋ 新增行程項目</button>
            <div id="itineraryList" class="space-y-0"></div>
        </div>

        <div id="page-items" class="page">
            <h2 class="font-black mb-4 text-xl">清單項目</h2>
            <div class="glass-card-dark border-t-4 border-blue-400">
                <h3 class="font-black text-blue-300 mb-3">要攜帶</h3>
                <div class="flex gap-2 mb-4"><input id="bringInput" type="text" placeholder="護照..."><button onclick="addItem('bring')" class="muji-btn w-auto px-6 bg-blue-600 shadow-none">＋</button></div>
                <div id="bringList"></div>
            </div>
            <div class="glass-card-dark mt-4 border-t-4 border-red-400">
                <h3 class="font-black text-red-300 mb-3">要購買</h3>
                <div class="flex gap-2 mb-4"><input id="buyInput" type="text" placeholder="伴手禮..."><button onclick="addItem('buy')" class="muji-btn w-auto px-6 bg-red-600 shadow-none">＋</button></div>
                <div id="buyList"></div>
            </div>
        </div>

        <div id="page-budget" class="page">
            <div class="glass-card-dark text-center py-6 mb-4"><div class="text-4xl font-black text-amber-400">¥ <span id="totalSpend">0</span></div><p class="opacity-40 text-xs mt-1">≈ NT$ <span id="totalTWD">0</span></p></div>
            <div class="glass-card p-5 mb-4"><label>＋ 新增支出</label><input id="expName" type="text" placeholder="品項名稱"><div class="grid grid-cols-2 gap-2"><input id="expCost" type="number" placeholder="日圓 ¥"><select id="expPayer"></select></div><button onclick="addExp()" class="muji-btn mt-2 py-3">儲存紀錄</button></div>
            <div id="expList" class="space-y-2"></div>
        </div>

        <div id="page-tools" class="page">
            <h2 class="font-black mb-4 text-xl text-amber-400">設定中心</h2>
            <div class="glass-card-dark"><label>匯率設定</label><input id="exRate" type="number" step="0.001" onchange="saveSettingsOnly()"></div>
            <div class="glass-card-dark"><label>名單管理 (4.2)</label>
                <div class="flex gap-2 mb-4"><input id="newPayer" type="text" placeholder="姓名"><button onclick="addPayerName()" class="muji-btn w-auto px-4">+</button></div>
                <div id="payerManagerList" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="glass-card-dark"><label>航班與旅客管理 (4.3)</label>
                <button onclick="openFlightEdit()" class="w-full py-4 bg-white/10 rounded-xl font-bold border border-white/10 text-white mb-2">修改主航班日期與資訊</button>
                <button onclick="openPsgrEdit()" class="w-full py-4 bg-white/10 rounded-xl font-bold border border-white/10 text-white">編輯 5 位旅客詳細資料</button>
            </div>
            <button onclick="resetToDefault()" class="w-full py-4 mt-10 text-red-400/30 font-bold border border-red-400/10 rounded-2xl">🆘 數據重置 (4.4)</button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 flex justify-around py-3 pb-8">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="text-white/40 flex flex-col items-center nav-active"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[10px] font-bold mt-1">行程</span></button>
        <button onclick="switchPage('items')" id="nav-items" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-list-check text-xl"></i><span class="text-[10px] font-bold mt-1">清單</span></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-coins text-xl"></i><span class="text-[10px] font-bold mt-1">記帳</span></button>
        <button onclick="switchPage('tools')" id="nav-tools" class="text-white/40 flex flex-col items-center"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[10px] font-bold mt-1">設定</span></button>
    </nav>

    <div id="viewModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-8 relative text-gray-800"><button onclick="closeModal('viewModal')" class="absolute top-4 right-4 text-2xl text-gray-400">×</button><div id="viewContent"></div><div class="mt-6 flex flex-col gap-2"><button id="viewMapBtn" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black">開啟導航</button><div class="grid grid-cols-2 gap-2"><button onclick="closeModal('viewModal')" class="py-4 bg-gray-100 rounded-xl font-bold">關閉</button><button id="viewDelBtn" class="py-4 bg-red-50 text-red-400 rounded-xl font-bold">刪除</button></div></div></div></div>
    <div id="itineraryModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 h-[80vh] overflow-y-auto text-gray-800"><h3>行程編輯</h3><input type="hidden" id="itIdx"><label>日期</label><input id="itDate" type="date"><label>時間</label><input id="itTime" type="time"><label>名稱</label><input id="itHeading" type="text"><label>地點</label><input id="itLoc" type="text"><label>備註</label><textarea id="itNote" style="height:100px"></textarea><button onclick="saveItinerary()" class="muji-btn mt-4">儲存行程</button><button onclick="closeModal('itineraryModal')" class="w-full py-4 text-gray-400">取消</button></div></div>
    <div id="psgrListModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 relative text-gray-800"><button onclick="closeModal('psgrListModal')" class="absolute top-4 right-4 text-xl">×</button><h3 class="font-black text-xl mb-4">旅客清單</h3><div id="psgrContainer" class="space-y-3"></div></div></div>
    
    <div id="flightEditModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 text-gray-800"><h3>航班設定</h3><label>航空公司</label><input id="in-airline"><label>去程日期</label><input id="in-dep-date" type="date"><label>回程日期</label><input id="in-arr-date" type="date"><button onclick="saveFlightMain()" class="muji-btn mt-6">儲存變更</button><button onclick="closeModal('flightEditModal')" class="w-full py-4 text-gray-400">取消</button></div></div>
    <div id="psgrEditModal" class="hidden modal-overlay"><div class="glass-card w-full max-w-sm p-6 h-[80vh] overflow-y-auto text-gray-800"><h3>編輯旅客資訊</h3><div id="psgrInputs"></div><button onclick="savePassengers()" class="muji-btn mt-4">儲存旅客資料</button><button onclick="closeModal('psgrEditModal')" class="w-full py-4 text-gray-400">取消</button></div></div>
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full opacity-0 transition-all z-[2000] pointer-events-none"></div>

    <script>
        const DB_KEY = 'vina_travel_v10_4';
        const masterData = {
            flightMain: { airline: "星宇航空", depFrom: "TPE", depTo: "NGO", depDate: "2026-05-23", arrDate: "2026-05-29", depNo: "JX830", depTime: "10:00", depArrTime: "14:00", arrFrom: "NGO", arrTo: "TPE", arrNo: "JX831", arrTime: "16:35", arrArrTime: "20:30" },
            passengers: Array(5).fill().map((_, i) => ({ name: "旅客 " + (i+1), pnr: "VINA88", seat: "--", meal: "--" })),
            itinerary: [{ date: "2026-05-23", time: "15:30", title: "抵達機場 & 取車", location: "NGO Airport", note: "" }],
            checkBring: [], checkBuy: [], expenses: [], payers: ["薇那", "大人B", "大人C"], rate: 0.21
        };
        let db = JSON.parse(JSON.stringify(masterData));

        function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active')); document.getElementById('nav-' + p).classList.add('nav-active'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function init() { 
            const local = localStorage.getItem(DB_KEY); 
            if (local) { db = { ...masterData, ...JSON.parse(local) }; }
            document.getElementById('exRate').value = db.rate || 0.21;
            renderAll(); 
        }

        function renderAll() {
            const today = "2026-04-08";
            const f = db.flightMain || masterData.flightMain;
            document.getElementById('f-airline').innerText = f.airline || "星宇航空";
            document.getElementById('f-dep-date').innerText = (f.depDate||"").replace('2026-','');
            document.getElementById('f-arr-date').innerText = (f.arrDate||"").replace('2026-','');
            
            const itList = document.getElementById('itineraryList'); itList.innerHTML = '';
            (db.itinerary || []).sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time)).forEach((it, idx) => {
                const card = document.createElement('div');
                card.className = `glass-card p-6 border-l-[8px] border-amber-400 ${it.date < today ? "is-past" : ""} cursor-pointer`;
                card.onclick = () => viewDetail(idx);
                card.innerHTML = `<span class="font-black text-gray-400 text-xs">${(it.date||"").replace('2026-','')} ${it.time}</span><h3 class="font-black text-gray-800 mt-1 text-lg">${it.title}</h3><p class="text-blue-600 font-bold mt-1 text-sm">${it.location}</p>`;
                itList.appendChild(card);
            });
            renderCheckList('bring', db.checkBring, 'bringList'); renderCheckList('buy', db.checkBuy, 'buyList');
            const rate = db.rate || 0.21; let total = 0;
            document.getElementById('expList').innerHTML = (db.expenses || []).slice().reverse().map(e => { total += e.cost; return `<div class="glass-card p-4 flex justify-between text-gray-800"><div><p class="font-black">${e.name}</p><p class="opacity-40 text-xs">${Math.round(e.cost*rate)} TWD • ${e.payer}</p></div><span class="font-black">¥${e.cost.toLocaleString()}</span></div>`; }).join('');
            document.getElementById('totalSpend').innerText = total.toLocaleString(); 
            document.getElementById('totalTWD').innerText = Math.round(total * rate).toLocaleString();
            document.getElementById('expPayer').innerHTML = (db.payers||[]).map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('payerManagerList').innerHTML = (db.payers||[]).map((p, i) => `<div class="bg-white/10 px-4 py-1 rounded-full text-sm">${p} <button onclick="delPayerName(${i})">×</button></div>`).join('');
        }

        // 行程功能還原
        async function saveItinerary() { 
            const idx = document.getElementById('itIdx').value; 
            const d = { date: document.getElementById('itDate').value, time: document.getElementById('itTime').value, title: document.getElementById('itHeading').value, location: document.getElementById('itLoc').value, note: document.getElementById('itNote').value };
            if(idx === "-1") db.itinerary.push(d); else db.itinerary[idx] = d; 
            closeModal('itineraryModal'); pushData(); 
        }
        function viewDetail(idx) { const it = db.itinerary[idx]; document.getElementById('viewContent').innerHTML = `<h2 class="text-2xl font-black mb-2 text-gray-800">${it.title}</h2><p class="text-blue-600 font-bold mb-4">${it.location}</p><div class="bg-gray-50 p-6 rounded-2xl text-gray-600">${(it.note || '').replace(/\n/g, '<br>')}</div>`; document.getElementById('viewMapBtn').onclick = () => window.open("http://maps.google.com/?q=" + encodeURIComponent(it.location)); document.getElementById('viewDelBtn').onclick = () => { db.itinerary.splice(idx,1); pushData(); closeModal('viewModal'); }; openModal('viewModal'); }
        function openAddItinerary() { document.getElementById('itIdx').value = "-1"; document.querySelectorAll('#itineraryModal input, #itineraryModal textarea').forEach(i => i.value = ''); openModal('itineraryModal'); }
        function openPassengerList() { document.getElementById('psgrContainer').innerHTML = db.passengers.map(p => `<div class="p-4 glass-card bg-stone-100/50"><p class="font-black text-gray-800">${p.name}</p><p class="text-amber-600 font-bold">${p.pnr} | 座位: ${p.seat}</p></div>`).join(''); openModal('psgrListModal'); }

        // 設定分頁：航班與旅客編輯
        function openFlightEdit() { document.getElementById('in-airline').value = db.flightMain.airline; document.getElementById('in-dep-date').value = db.flightMain.depDate; document.getElementById('in-arr-date').value = db.flightMain.arrDate; openModal('flightEditModal'); }
        function saveFlightMain() { db.flightMain.airline = document.getElementById('in-airline').value; db.flightMain.depDate = document.getElementById('in-dep-date').value; db.flightMain.arrDate = document.getElementById('in-arr-date').value; closeModal('flightEditModal'); pushData(); }
        function openPsgrEdit() { document.getElementById('psgrInputs').innerHTML = db.passengers.map((p, i) => `<div class="mb-4 border-b border-gray-100 pb-2"><label>旅客 ${i+1}</label><input id="pName${i}" value="${p.name}" placeholder="姓名"><div class="grid grid-cols-2 gap-2"><input id="pSeat${i}" value="${p.seat}" placeholder="座位"><input id="pMeal${i}" value="${p.meal}" placeholder="餐食"></div></div>`).join(''); openModal('psgrEditModal'); }
        function savePassengers() { db.passengers = db.passengers.map((_, i) => ({ name: document.getElementById('pName'+i).value, pnr: "VINA88", seat: document.getElementById('pSeat'+i).value, meal: document.getElementById('pMeal'+i).value })); closeModal('psgrEditModal'); pushData(); }

        // 清單功能還原
        async function addItem(t) { const inp = document.getElementById(t + 'Input'); if(inp.value) { db[t === 'bring' ? 'checkBring' : 'checkBuy'].push({text: inp.value, done: false}); inp.value = ''; pushData(); } }
        async function toggleCheck(t, i) { const list = db[t === 'bring' ? 'checkBring' : 'checkBuy']; list[i].done = !list[i].done; pushData(); }
        async function delItem(t, i) { db[t === 'bring' ? 'checkBring' : 'checkBuy'].splice(i, 1); pushData(); }
        function renderCheckList(t, list, cid) { document.getElementById(cid).innerHTML = list.map((item, idx) => `<div class="list-row"><div class="flex items-center gap-4 flex-grow" onclick="toggleCheck('${t}',${idx})"><i class="fa-solid ${item.done ? 'fa-square-check text-amber-500' : 'fa-square text-white/20'} text-2xl"></i><span class="${item.done ? 'opacity-30 line-through' : 'font-bold'}">${item.text}</span></div><button onclick="delItem('${t}',${idx})" class="opacity-20 ml-4">×</button></div>`).join(''); }

        // 其他基礎功能
        async function updateWeather() { document.getElementById('weatherContainer').innerHTML = '載入中...'; try { const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.18&longitude=136.90&hourly=temperature_2m,weathercode&forecast_days=1"); const data = await res.json(); const now = new Date().getHours(); let html = ''; for(let i=0; i<6; i++){ const tIdx = (now + i) % 24; html += `<div class="flex-shrink-0 text-center w-[30%]"><p class="text-[10px] opacity-40">${tIdx}:00</p><i class="fa-solid fa-cloud my-1"></i><p class="font-bold text-sm">${Math.round(data.hourly.temperature_2m[tIdx])}°</p></div>`; } document.getElementById('weatherContainer').innerHTML = html; } catch(e){} }
        async function addExp() { const n = document.getElementById('expName').value, c = parseFloat(document.getElementById('expCost').value), p = document.getElementById('expPayer').value; if(n && c) { db.expenses.push({name: n, cost: c, payer: p}); pushData(); } }
        async function addPayerName() { const n = document.getElementById('newPayer').value.trim(); if(n && !db.payers.includes(n)) { db.payers.push(n); document.getElementById('newPayer').value=''; pushData(); } }
        function delPayerName(i) { db.payers.splice(i,1); pushData(); }
        function pushData() { localStorage.setItem(DB_KEY, JSON.stringify(db)); renderAll(); }
        function saveSettingsOnly() { db.rate = parseFloat(document.getElementById('exRate').value); pushData(); }
        function resetToDefault() { if(confirm("確定重置所有數據？")) { localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</html>
