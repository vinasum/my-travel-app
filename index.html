/* 離線狀態下的按鈕旋轉動畫 (同步時可用) */
        .spinning {
            animation: fa-spin 1s infinite linear;

        /* 離線模式下，強制禁止點擊所有增加資料的按鈕 */
        body.is-offline button[onclick*="addItem"],
        body.is-offline button[onclick*="addExp"] {
            filter: grayscale(1);
            pointer-events: none !important;
        }

        :root { --n-gold: #E6B422; --n-wago: #1A2A3A; }
        
        body { 
            font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-wago);

            background-size: cover; background-attachment: fixed; background-position: center;
            color: #FFFFFF; text-align: left; margin: 0; min-height: 100vh;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); color: #1F2937;
        }
        .glass-card-dark {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav { 
            background: rgba(10, 25, 47, 0.82); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 100; 
        }
        nav button { color: rgba(255, 255, 255, 0.5) !important; }

        .muji-btn { background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); color: white; padding: 16px; border-radius: 18px; font-weight: 700; text-align: center; border: none; width: 100%; display: block; cursor: pointer; }

        label { display: block; font-size: 16px; font-weight: 900; color: var(--n-gold); margin-bottom: 6px; margin-top: 10px; }
        input, select, textarea { width: 100%; border: 1px solid #ddd !important; border-radius: 16px; padding: 14px; margin-bottom: 10px; outline: none; background: #fff !important; color: #333 !important; font-size: 14px !important; }

        .page { display: none; padding-bottom: 150px; }

/* 唯讀模式隱藏規則 */

    <script>
// --- 離線偵測系統 ---
function updateOnlineStatus() {
    const syncBtn = document.getElementById('syncBtn');
    const offlineNotice = document.getElementById('offline-notice');
    
    if (!navigator.onLine) {
        // 1. 進入離線模式：顯示提示、按鈕變灰
        document.body.classList.add('is-offline');
        if (offlineNotice) offlineNotice.classList.remove('hidden');
        if (syncBtn) {
            syncBtn.style.opacity = "0.1";
            syncBtn.style.pointerEvents = "none";
        }
        
        // 2. 顯示一次性的提示通知
        if (typeof toast === 'function') toast("🚫 目前無網路，已開啟唯讀模式");
        
        // 3. 鎖定所有輸入框與存檔按鈕
        toggleInputs(true);
    } else {
        // 1. 回到在線模式：隱藏提示、恢復按鈕
        document.body.classList.remove('is-offline');
        if (offlineNotice) offlineNotice.classList.add('hidden');
        if (syncBtn) {
            syncBtn.style.opacity = "1";
            syncBtn.style.pointerEvents = "auto";
        }
        
        // 2. 解除鎖定
        toggleInputs(false);
    }
}

// 鎖定/解鎖所有輸入元件的輔助函式
function toggleInputs(disabled) {
    const elements = document.querySelectorAll('input, select, textarea, button[onclick*="addItem"], button[onclick*="addExp"]');
    elements.forEach(el => {
        el.disabled = disabled;
        el.style.opacity = disabled ? "0.5" : "1";
        if(disabled) el.style.cursor = "not-allowed";
        else el.style.cursor = "auto";
    });
}

// 監聽網路切換事件
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// 修改妳原本的 init()，加入啟動偵測
function init() {
    updateOnlineStatus(); // 確保一開 App 就檢查網路
    
    // ... 妳原本讀取 localStorage 和 renderAll 的邏輯 ...
    const local = localStorage.getItem(DB_KEY);
    if (local) {
        db = JSON.parse(local);
        renderAll();
    }
    
    // 如果有網路，才執行自動下載
    if (navigator.onLine) {
        pullData();
    }
}

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyygnjaryM3s4Zf9XSnVStWNhBpwUoFrdJp1jX2-IFmYzglxlfdd_enycNmW5Y_92ejfg/exec';
        // 重要：固定此 KEY，以後更新程式碼都不會清除手機資料
        const DB_KEY = 'vina_travel_production_v1';
        
        const masterData = {
            flightMain: { airline: "星宇航空", depFrom: "TPE", depTo: "NGO", depDate: "2026-05-23", depNo: "JX830", depTime: "10:00", depArrTime: "14:00", arrFrom: "NGO", arrTo: "TPE", arrDate: "2026-05-29", arrNo: "JX831", arrTime: "16:35", arrArrTime: "20:30" },
            passengers: [
                { name: "薇那 (Vina)", pnr: "VINA88", seat: "12A", meal: "Standard" },
                { name: "大人 B", pnr: "VINA88", seat: "12B", meal: "Standard" },
                { name: "大人 C", pnr: "VINA88", seat: "12C", meal: "Standard" },
                { name: "小朋友 D", pnr: "VINA88", seat: "13A", meal: "Child" },
                { name: "小朋友 E", pnr: "VINA88", seat: "13B", meal: "Child" }
            ],
            itinerary: [
                { date: "2026-05-23", time: "15:30", driveTime: "45min", title: "抵達 & 取車", location: "中部國際機場(NGO)", note: "需前往租車櫃檯。" },
                { date: "2026-05-23", time: "18:30", driveTime: "", title: "入住 & 晚餐", location: "武士之家 (Samurai House)", note: "附近有味噌豬排。" },
                { date: "2026-05-24", time: "10:00", driveTime: "20min", title: "名古屋港水族館", location: "名古屋港水族館", note: "看虎鯨與企鵝遊行。" },

                { date: "2026-05-26", time: "10:30", driveTime: "35min", title: "吉卜力公園", location: "吉卜力公園", note: "需預約大倉庫門票。" },
                { date: "2026-05-27", time: "10:00", driveTime: "15min", title: "東山動植物園", location: "東山動植物園", note: "看大猩猩夏巴尼。" },

                { date: "2026-05-29", time: "11:00", driveTime: "", title: "最後採買", location: "AEON Mall", note: "" }
            ],
            checkBring: [{text:"護照", done:false}, {text:"國際駕照", done:false}], checkBuy: [], expenses: [], payers: ["薇那", "大人B", "大人C"], rate: 0.21
        };
        let db = JSON.parse(JSON.stringify(masterData));

        function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active')); document.getElementById('nav-' + p).classList.add('nav-active'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

        function init() { 
// 偵測網址是否有 ?mode=view
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'view') {

function renderAll() {
            // 1. 動態取得今天日期，確保手機端能正確顯示「過去行程」的灰階效果
            const todayStr = new Date().toISOString().split('T')[0];

            // 2. 渲染航班主體卡片
            const f = db.flightMain || masterData.flightMain;
            document.getElementById('f-airline').innerText = f.airline;
            document.getElementById('f-dep-date').innerText = (f.depDate||"").replace('2026-', '');
            document.getElementById('f-arr-date').innerText = (f.arrDate||"").replace('2026-', '');
            document.getElementById('f-dep-from').innerText = f.depFrom; document.getElementById('f-dep-to').innerText = f.depTo;
            document.getElementById('f-dep-no').innerText = f.depNo; document.getElementById('f-dep-time').innerText = f.depTime; document.getElementById('f-dep-arr-time').innerText = f.depArrTime;
            document.getElementById('f-arr-from').innerText = f.arrFrom; document.getElementById('f-arr-to').innerText = f.arrTo;
            document.getElementById('f-arr-no').innerText = f.arrNo; document.getElementById('f-arr-time').innerText = f.arrTime; document.getElementById('f-arr-arr-time').innerText = f.arrArrTime;

            // 3. 渲染行程清單 (自動偵測日期切換並劃線)
            db.itinerary.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
            const itList = document.getElementById('itineraryList'); 
            itList.innerHTML = '';
            
            db.itinerary.forEach((it, idx) => {
                const isPast = it.date < todayStr ? "is-past" : "";
                
                // 產生行程卡片 HTML
                let cardHtml = `<div onclick="viewDetail(${idx})" class="glass-card p-4 bg-white/40 border-l-[8px] border-amber-400 ${isPast}">
                    <span class="font-black text-gray-500 uppercase text-[16px]">${it.date.replace('2026-', '')} ${it.time}</span>
                    <h3 class="font-black text-gray-800 mt-1 text-[20px]">${it.title || '(未命名)'}</h3>
                    <p class="text-blue-600 font-bold mt-1 text-[16px]">${it.location || ''}</p></div>`;

                itList.innerHTML += cardHtml;

                // 核心邏輯：只要當前行程與下一個行程日期不同，就自動劃線
                const nextIt = db.itinerary[idx + 1];
                if (nextIt && it.date !== nextIt.date) {
                    itList.innerHTML += `
                        <div class="day-divider">
                            <div class="silver-line"></div>
                            <span class="divider-text">Next Day</span>
                            <div class="silver-line"></div>
                        </div>`;
                }

                // 渲染車程
                if (it.driveTime && idx < db.itinerary.length - 1) {
                    itList.innerHTML += `<div class="drive-container ${isPast}"><div class="drive-tag"><i class="fa-solid fa-car"></i> ${it.driveTime}</div></div>`;
                }
            });

            // 4. 渲染清單 (物品清單)
            renderCheckList('bring', db.checkBring, 'bringList'); 
            renderCheckList('buy', db.checkBuy, 'buyList');

            // 5. 渲染記帳統計
            const rate = db.rate || 0.21; 
            let total = 0; 
            const ps = {}; 
            (db.payers||[]).forEach(p => ps[p] = 0);

            document.getElementById('expList').innerHTML = (db.expenses||[]).slice().reverse().map((e, i) => { 
                total += e.cost; ps[e.payer] += e.cost; 
                return `<div class="glass-card p-4 flex justify-between items-center text-gray-800">
                            <div><p class="font-black">${e.name}</p><p class="opacity-50 text-[14px]">${Math.round(e.cost * rate)} TWD • ${e.payer}</p></div>
                            <span class="font-black text-xl">¥${e.cost.toLocaleString()}</span>
                        </div>`; 
            }).join('');
            
            document.getElementById('totalSpend').innerText = total.toLocaleString(); 
            document.getElementById('totalTWD').innerText = Math.round(total * rate).toLocaleString();

            // 6. 渲染成人統計小卡
            document.getElementById('payerStats').innerHTML = Object.entries(ps).map(([p, v]) => `
                <div class="glass-card bg-gray-900/80 text-white p-4 rounded-2xl text-center border-none shadow-none">
                    <p class="opacity-50 text-[12px] uppercase font-bold">${p}</p>
                    <p class="font-black text-[16px] text-amber-400">¥${v.toLocaleString()}</p>
                </div>`).join('');
            
            // 7. 更新設定頁面元件
            document.getElementById('expPayer').innerHTML = (db.payers||[]).map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('payerManagerList').innerHTML = (db.payers||[]).map((p, i) => `
                <div class="bg-white/10 px-4 py-1 rounded-full text-base text-white flex items-center gap-2">
                    ${p} <button onclick="delPayerName(${i})">×</button>
                </div>`).join('');
        }
        function renderCheckList(t, list, cid) { 
            const container = document.getElementById(cid);
            if (!container) return;
            container.innerHTML = list.map((item, idx) => `
                <div class="list-row">
                    <div class="flex items-center gap-4 flex-grow overflow-hidden" onclick="toggleCheck('${t}',${idx})">

<i class="fa-solid ${item.done ? 'fa-square-check text-amber-500' : 'fa-square text-white/20'} text-xl flex-shrink-0"></i> 
<span class="${item.done ? 'opacity-30 line-through' : 'font-bold'} truncate text-[16px] text-white">${item.text}</span>                    </div>
                    <button onclick="delItem('${t}',${idx})" class="text-white/20 hover:text-red-400 p-2 ml-2 flex-shrink-0"><i class="fa-solid fa-xmark"></i></button>
                </div>`).join(''); 
        }

        function getWeatherIcon(code) {
            if (code === 0) return 'fa-sun text-amber-400';
            if (code >= 1 && code <= 3) return 'fa-cloud-sun text-gray-300';
            if (code >= 45 && code <= 48) return 'fa-smog text-gray-400';
            if (code >= 51 && code <= 67) return 'fa-cloud-showers-heavy text-blue-400';
            if (code >= 71 && code <= 77) return 'fa-snowflake text-blue-200';
            if (code >= 80 && code <= 82) return 'fa-cloud-rain text-blue-500';
            if (code >= 95) return 'fa-cloud-bolt text-yellow-300';
            return 'fa-cloud text-gray-300';
        }

        async function updateWeather() { 
            try { 
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=35.18&longitude=136.90&hourly=temperature_2m,weathercode&forecast_days=1"); 
                const data = await res.json(); 
                const now = new Date().getHours(); 
                let html = '';
                for(let i=0; i<6; i++) {
                    const tIdx = (now + i) % 24;
                    const wCode = data.hourly.weathercode[tIdx];
                    html += `<div class="weather-item"><p class="text-white font-bold text-[11px] mb-1">${tIdx}:00</p><i class="fa-solid ${getWeatherIcon(wCode)} text-xl my-1"></i><p class="font-black text-white">${Math.round(data.hourly.temperature_2m[tIdx])}°</p></div>`;
                } 
                document.getElementById('weatherContainer').innerHTML = html; 
            } catch(e){ console.error(e); }
        }

        function viewDetail(idx) { const it = db.itinerary[idx]; document.getElementById('viewContent').innerHTML = `<p class="opacity-40 font-black uppercase">${it.date.replace('2026-', '')} ${it.time}</p><h2 class="text-2xl font-black mb-2">${it.title}</h2><p class="text-blue-600 font-bold mb-6">${it.location}</p><div class="bg-stone-50 p-6 rounded-3xl text-lg">${(it.note || '').replace(/\n/g, '<br>')}</div>`; document.getElementById('viewMapBtn').onclick = () => window.open("http://maps.google.com/?q=" + encodeURIComponent(it.location)); document.getElementById('viewEditBtn').onclick = () => { closeModal('viewModal'); openEditItinerary(idx); }; document.getElementById('viewDelBtn').onclick = () => { db.itinerary.splice(idx,1); pushData(); closeModal('viewModal'); }; openModal('viewModal'); }
        function openEditItinerary(idx) { const it = db.itinerary[idx]; document.getElementById('itIdx').value = idx; document.getElementById('itDate').value = it.date; document.getElementById('itTime').value = it.time; document.getElementById('itDrive').value = it.driveTime; document.getElementById('itHeading').value = it.title; document.getElementById('itLoc').value = it.location; document.getElementById('itNote').value = it.note; openModal('itineraryModal'); }
        function openAddItinerary() { document.querySelectorAll('#itineraryModal input, #itineraryModal textarea').forEach(i => i.value = ''); document.getElementById('itIdx').value = "-1"; openModal('itineraryModal'); }
        async function saveItinerary() { const idx = document.getElementById('itIdx').value; const data = { date: document.getElementById('itDate').value, time: document.getElementById('itTime').value, driveTime: document.getElementById('itDrive').value, title: document.getElementById('itHeading').value, location: document.getElementById('itLoc').value, note: document.getElementById('itNote').value }; if(idx === "-1") db.itinerary.push(data); else db.itinerary[idx] = data; closeModal('itineraryModal'); pushData(); }
        function openPassengerList() { document.getElementById('psgrContainer').innerHTML = db.passengers.map(p => `<div class="p-4 glass-card bg-stone-50/80"><p class="font-black text-lg">${p.name}</p><p class="text-blue-600 font-bold">${p.pnr}</p><div class="flex gap-4 opacity-50 text-sm mt-2"><span>座: ${p.seat}</span><span>餐: ${p.meal}</span></div></div>`).join(''); openModal('psgrListModal'); }
        function openFlightEdit() { const f = db.flightMain; document.getElementById('in-airline').value = f.airline; document.getElementById('in-dep-from').value = f.depFrom; document.getElementById('in-dep-to').value = f.depTo; document.getElementById('in-dep-date').value = f.depDate; document.getElementById('in-dep-no').value = f.depNo; document.getElementById('in-dep-time').value = f.depTime; document.getElementById('in-dep-arr-time').value = f.depArrTime; document.getElementById('in-arr-from').value = f.arrFrom; document.getElementById('in-arr-to').value = f.arrTo; document.getElementById('in-arr-date').value = f.arrDate; document.getElementById('in-arr-no').value = f.arrNo; document.getElementById('in-arr-time').value = f.arrTime; document.getElementById('in-arr-arr-time').value = f.arrArrTime; openModal('flightEditModal'); }
        function saveFlightMain() { db.flightMain = { airline: document.getElementById('in-airline').value, depFrom: document.getElementById('in-dep-from').value, depTo: document.getElementById('in-dep-to').value, depDate: document.getElementById('in-dep-date').value, depNo: document.getElementById('in-dep-no').value, depTime: document.getElementById('in-dep-time').value, depArrTime: document.getElementById('in-dep-arr-time').value, arrFrom: document.getElementById('in-arr-from').value, arrTo: document.getElementById('in-arr-to').value, arrDate: document.getElementById('in-arr-date').value, arrNo: document.getElementById('in-arr-no').value, arrTime: document.getElementById('in-arr-time').value, arrArrTime: document.getElementById('in-arr-arr-time').value }; closeModal('flightEditModal'); pushData(); }
        function openPsgrEdit() { document.getElementById('psgrInputs').innerHTML = db.passengers.map((p, i) => `<div class="mb-4 border-b pb-2"><label>旅客 ${i+1}</label><input id="pName${i}" value="${p.name}"><div class="grid grid-cols-2 gap-2"><input id="pSeat${i}" value="${p.seat}"><input id="pMeal${i}" value="${p.meal}"></div></div>`).join(''); openModal('psgrEditModal'); }
        function savePassengers() { db.passengers = db.passengers.map((_, i) => ({ name: document.getElementById('pName'+i).value, pnr: "VINA88", seat: document.getElementById('pSeat'+i).value, meal: document.getElementById('pMeal'+i).value })); closeModal('psgrEditModal'); pushData(); }
        async function addItem(t) { const inp = document.getElementById(t + 'Input'); if(inp.value) { db[t === 'bring' ? 'checkBring' : 'checkBuy'].push({text: inp.value, done: false}); inp.value = ''; pushData(); } }
        async function toggleCheck(t, i) { const list = db[t === 'bring' ? 'checkBring' : 'checkBuy']; list[i].done = !list[i].done; pushData(); }
        async function delItem(t, i) { db[t === 'bring' ? 'checkBring' : 'checkBuy'].splice(i, 1); pushData(); }
        async function addExp() { const n = document.getElementById('expName').value, c = parseFloat(document.getElementById('expCost').value), p = document.getElementById('expPayer').value; if(n && c) { db.expenses.push({name: n, cost: c, payer: p}); await pushData(); } }
        async function addPayerName() { const n = document.getElementById('newPayer').value.trim(); if(n && !db.payers.includes(n)) { db.payers.push(n); document.getElementById('newPayer').value=''; pushData(); } }
        function delPayerName(i) { db.payers.splice(i,1); pushData(); }
        function saveSettingsOnly() { db.rate = parseFloat(document.getElementById('exRate').value); pushData(); }
async function pushData() {
    showSync(true);
    localStorage.setItem(DB_KEY, JSON.stringify(db)); // 所有的資料依然會存在手機裡
    renderAll();

    try {
        // --- 核心改動：建立一個「乾淨版」的副本送上雲端 ---
        const syncData = { ...db };
        delete syncData.checkBring; // 刪除要攜帶清單，不送去雲端
        delete syncData.checkBuy;   // 刪除要購買清單，不送去雲端
        // -------------------------------------------

        await fetch(GOOGLE_SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify(syncData) // 只傳送行程和記帳
        });
    } catch(e) { console.error(e); }
    showSync(false);
}
        async function pullData() {
    showSync(true);
    try {
        const res = await fetch(GOOGLE_SCRIPT_URL);
        const cloudData = await res.json();
        
        if(cloudData) {
            // 先備份本地的清單
            const localBring = db.checkBring;
            const localBuy = db.checkBuy;

            // 讀取雲端資料
            db = Object.assign({}, masterData, cloudData);

            // 把本地備份的清單填回去，防止被雲端覆蓋
            db.checkBring = localBring;
            db.checkBuy = localBuy;

            localStorage.setItem(DB_KEY, JSON.stringify(db));
            renderAll();
            toast("🏮 同步成功 (清單維持本地)");
        }
    } catch (e) {}
    showSync(false);
}
        function resetToDefault() { if(confirm("確定重置數據？")) { localStorage.clear(); location.reload(); } }
        function toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        function showSync(s) { document.getElementById('syncBar').style.transform = s ? 'scaleX(1)' : 'scaleX(0)'; }
// 註冊 Service Worker 讓 Chrome 認可這是個 App
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => {
                console.log('Service Worker 註冊成功');
            });
        }
        init();
    </script>
