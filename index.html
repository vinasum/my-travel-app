<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v7.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --n-gold: #E6B422; --n-miso: #8D6E63; --n-paper: #FDFBF7; }
        body { font-size: 16px; font-family: 'Noto Sans TC', sans-serif; background-color: var(--n-paper); color: #1F2937; text-align: left; }
        p, span, div, input, button, label, select, textarea { font-size: 14px !important; }
        .card { background: #FFFFFF; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid rgba(230,180,34,0.15); }
        .muji-btn { background: linear-gradient(135deg, var(--n-miso) 0%, #6D4C41 100%); color: white; padding: 16px; border-radius: 18px; font-weight: 700; text-align: center; cursor: pointer; border: none; width: 100%; }
        .page { display: none; padding-bottom: 150px; }
        .page.active { display: block; }
        .nav-active { color: var(--n-miso) !important; font-weight: 900 !important; }

        /* 清單修復：垂直對齊、絕對不換行、極窄間距 */
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(0,0,0,0.03); flex-wrap: nowrap !important; width: 100%; }
        .list-content { display: flex; align-items: center; gap: 12px; flex-grow: 1; min-width: 0; cursor: pointer; }
        .list-text { font-weight: 700; color: #4B5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
        .list-del-btn { flex-shrink: 0 !important; color: #D1D5DB; padding: 0 10px; font-size: 24px !important; height: 30px; display: flex; align-items: center; }

        .weather-scroll { display: flex; overflow-x: auto; gap: 10px; }
        .weather-item { flex: 0 0 calc(33.33% - 7px); text-align: center; background: rgba(255,255,255,0.8); padding: 12px 5px; border-radius: 18px; border: 1px solid rgba(230,180,34,0.1); }
        input, select { width: 100%; border: 1px solid #E2E8F0; border-radius: 16px; padding: 14px; margin-bottom: 10px; outline: none; background: #fff; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative">
    <div id="syncBar" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; background: var(--n-gold); z-index: 9999; transform: scaleX(0); transition: 0.4s; transform-origin: left;"></div>
    
    <header class="p-6 pt-10 flex justify-between items-center text-left">
        <h1 class="text-2xl font-black text-gray-800">名古屋旅程 <span class="bg-amber-400 text-[12px] px-2 py-1 rounded-lg ml-1">v7.5</span></h1>
        <button onclick="pullData()" class="text-stone-300 text-3xl p-2"><i class="fa-solid fa-arrows-rotate"></i></button>
    </header>

    <main class="px-5">
        <div id="page-itinerary" class="page active">
            <div onclick="openFlightModal()" class="card p-5 border-t-8 border-amber-400 text-left">
                <div class="flex justify-between items-center mb-3"><h2 class="font-black text-lg" id="f-airline">航空公司</h2><i class="fa-solid fa-chevron-right text-stone-200"></i></div>
                <div class="space-y-2">
                    <div><p class="text-blue-500 font-black uppercase text-[12px]">去程</p><p id="f-dep-line" class="font-bold text-gray-600">載入中...</p></div>
                    <div><p class="text-red-500 font-black uppercase text-[12px]">回程</p><p id="f-arr-line" class="font-bold text-gray-600">載入中...</p></div>
                </div>
            </div>
            <div class="card p-4 bg-blue-50/50 border-none text-left">
                <div class="flex justify-between items-center mb-3"><span class="font-black text-gray-500 uppercase text-[12px]">Weather (6H)</span>
                    <div class="flex gap-2"><button onclick="window.open('https://weather.yahoo.co.jp/weather/jp/23/5110.html')" class="text-blue-500 font-bold text-[12px]">Yahoo</button><button onclick="updateWeather()" class="text-amber-600 font-bold text-[12px]">更新</button></div>
                </div>
                <div id="weatherContainer" class="weather-scroll"><p class="w-full text-center opacity-40">待更新...</p></div>
            </div>
            <button onclick="openAddItinerary()" class="muji-btn mb-4">＋ 新增行程</button>
            <div id="itineraryList" class="space-y-0"></div>
            <button onclick="resetToDefault()" class="w-full py-4 mt-20 text-stone-300 font-bold border border-stone-100 rounded-2xl">🆘 恢復行程備份</button>
        </div>

        <div id="page-items" class="page text-left">
            <h2 class="font-black mb-4 text-xl">物品清單</h2>
            <div class="card p-5 border-t-4 border-blue-400">
                <h3 class="font-black text-blue-500 mb-3">要攜帶</h3>
                <div class="flex gap-2 mb-2"><input id="bringInput" type="text" placeholder="帶什麼？"><button onclick="addItem('bring')" class="muji-btn w-auto px-5 bg-blue-500 shadow-none">＋</button></div>
                <div id="bringList"></div>
            </div>
            <div class="card p-5 border-t-4 border-red-400 mt-4">
                <h3 class="font-black text-red-500 mb-3">要購買</h3>
                <div class="flex gap-2 mb-2"><input id="buyInput" type="text" placeholder="買什麼？"><button onclick="addItem('buy')" class="muji-btn w-auto px-5 bg-red-500 shadow-none">＋</button></div>
                <div id="buyList"></div>
            </div>
        </div>

        <div id="page-budget" class="page text-left">
            <div class="card p-8 bg-stone-800 text-white text-center mb-4"><div class="text-3xl font-black">¥ <span id="totalSpend">0</span></div><p class="opacity-50 mt-1 font-bold">≈ NT$ <span id="totalTWD">0</span></p></div>
            <div id="payerStats" class="grid grid-cols-3 gap-2 mb-4"></div>
            <div class="card p-5"><input id="expName" type="text" placeholder="項目"><input id="expCost" type="number" placeholder="日圓(JPY)"><select id="expPayer"></select><button onclick="addExp()" class="muji-btn mt-2">紀錄支出</button></div>
            <div id="expList" class="space-y-2 mt-4"></div>
        </div>

        <div id="page-tools" class="page text-left"><h2 class="font-black mb-6 text-xl">設定</h2><div class="card p-6">名單管理<div class="flex gap-2 mt-2 mb-4"><input id="newPayer" type="text"><button onclick="addPayerName()" class="muji-btn w-auto px-4">+</button></div><div id="payerManagerList" class="flex flex-wrap gap-2 mb-6"></div>匯率 (JPY=TWD)<input id="exRate" type="number" step="0.01" value="0.21" onchange="saveSettingsOnly()" class="text-amber-600 font-bold"></div></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-amber-50 flex justify-around py-4 pb-10 z-50">
        <button onclick="switchPage('itinerary')" id="nav-itinerary" class="text-stone-300"><i class="fa-solid fa-map-location-dot text-2xl"></i></button>
        <button onclick="switchPage('items')" id="nav-items" class="text-stone-300"><i class="fa-solid fa-list-check text-2xl"></i></button>
        <button onclick="switchPage('budget')" id="nav-budget" class="text-stone-300"><i class="fa-solid fa-coins text-2xl"></i></button>
        <button onclick="switchPage('tools')" id="nav-tools" class="text-stone-300"><i class="fa-solid fa-user-gear text-2xl"></i></button>
    </nav>

    <div id="flightModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300] backdrop-blur-md text-left"><div class="card w-full p-6 h-[85vh] overflow-y-auto border-t-8 border-amber-400"><div class="flex justify-between items-center mb-6"><h3>航班與旅客</h3><button onclick="closeModal('flightModal')" class="text-4xl">×</button></div>
